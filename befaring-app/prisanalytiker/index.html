<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prisanalytiker — HoY Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --navy: #0a2140;
      --navy-light: #0d2b54;
      --gold: #c9a84c;
      --gold-hover: #e0c06a;
      --white: #ffffff;
      --surface: #f7f8fa;
      --surface2: #eef0f4;
      --border: #d0d5dd;
      --text: #1a2a3a;
      --text-muted: #6b7a8d;
      --danger: #c0392b;
      --success: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--navy);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .nav-left { display: flex; align-items: center; gap: 16px; }
    .nav-logo { color: var(--gold); font-weight: 700; font-size: 18px; letter-spacing: 0.5px; text-decoration: none; }
    .nav-sep { color: rgba(255,255,255,0.2); font-size: 20px; }
    .nav-title { color: rgba(255,255,255,0.85); font-size: 15px; font-weight: 500; }
    .nav-back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .nav-back:hover { background: rgba(255,255,255,0.1); color: var(--white); }

    /* ── LAYOUT ── */
    .page { display: flex; gap: 0; min-height: calc(100vh - 60px); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      max-height: calc(100vh - 60px);
      position: sticky;
      top: 60px;
    }
    .sidebar h3 {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .filter-group { margin-bottom: 18px; }
    .filter-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
    }
    select, input[type=number] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text);
      background: var(--white);
      appearance: auto;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type=number]:focus { border-color: var(--gold); }
    .range-row { display: flex; gap: 6px; align-items: center; }
    .range-row span { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .range-row input { width: 100%; }

    .btn-reset {
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.15s;
    }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

    .data-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .badge-ekstern { background: #e8f4fd; color: #1565c0; }
    .badge-intern { background: #e8f5e9; color: #2e7d32; }
    .kilde-toggle { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
    .kilde-btn {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--white);
      color: var(--text-muted);
    }
    .kilde-btn.active-ekstern { border-color: #1565c0; background: #e8f4fd; color: #1565c0; }
    .kilde-btn.active-intern { border-color: #2e7d32; background: #e8f5e9; color: #2e7d32; }
    .kilde-btn.active-all { border-color: var(--navy); background: var(--navy); color: white; }

    /* ── MAIN ── */
    .main { flex: 1; padding: 24px; min-width: 0; }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid var(--border);
    }
    .stat-card .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
    }
    .stat-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .stat-card.highlight { border-color: var(--gold); background: #fdf8ee; }
    .stat-card.highlight .value { color: #8a6820; }

    /* ── RESULT HEADER ── */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .result-count {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .result-count span { color: var(--navy); }
    .sort-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
    .sort-row select { width: auto; padding: 5px 8px; font-size: 12px; }

    /* ── CHART ── */
    .chart-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .chart-wrap h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
    .chart-wrap canvas { max-height: 200px; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: var(--navy); color: var(--white); }
    th {
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { background: var(--navy-light); }
    th .sort-icon { opacity: 0.4; margin-left: 4px; }
    th.sorted .sort-icon { opacity: 1; color: var(--gold); }
    tbody tr { border-bottom: 1px solid var(--surface2); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }
    td { padding: 9px 12px; vertical-align: middle; }
    .td-tittel { max-width: 220px; }
    .tittel-link {
      color: var(--navy);
      text-decoration: none;
      font-weight: 500;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tittel-link:hover { color: var(--gold); text-decoration: underline; }
    .no-link { font-weight: 500; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge-kilde {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    .badge-ekstern2 { background: #e8f4fd; color: #1565c0; }
    .badge-intern2 { background: #e8f5e9; color: #2e7d32; }
    .pris-cell { font-weight: 700; color: var(--navy); white-space: nowrap; }
    .td-center { text-align: center; }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state svg { margin-bottom: 12px; opacity: 0.3; }
    .empty-state p { font-size: 15px; }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      color: var(--text-muted);
    }
    .pager-btns { display: flex; gap: 6px; }
    .pager-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      background: var(--white);
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    .pager-btn:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
    .pager-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pager-btn.active { background: var(--navy); color: white; border-color: var(--navy); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .page { flex-direction: column; }
      .sidebar { width: 100%; max-height: none; position: static; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a class="nav-logo" href="/">HoY</a>
    <span class="nav-sep">|</span>
    <span class="nav-title">Prisanalytiker</span>
  </div>
  <a class="nav-back" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Tilbake
  </a>
</nav>

<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Filtrer</h3>

    <div class="filter-group">
      <span class="filter-label">Datakilde</span>
      <div class="kilde-toggle">
        <button class="kilde-btn active-all" id="kilde-all" onclick="setKilde('all')">Alle</button>
        <button class="kilde-btn" id="kilde-ekstern" onclick="setKilde('ekstern')">Ekstern</button>
        <button class="kilde-btn" id="kilde-intern" onclick="setKilde('intern')">Intern</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-merke">Merke</label>
      <select id="f-merke" onchange="applyFilters()">
        <option value="">Alle merker</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-type">Båttype</label>
      <select id="f-type" onchange="applyFilters()">
        <option value="">Alle typer</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Årsmodell</label>
      <div class="range-row">
        <input type="number" id="f-ar-fra" placeholder="Fra" min="1960" max="2026" onchange="applyFilters()">
        <span>–</span>
        <input type="number" id="f-ar-til" placeholder="Til" min="1960" max="2026" onchange="applyFilters()">
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Lengde (fot)</label>
      <div class="range-row">
        <input type="number" id="f-fot-fra" placeholder="Fra" min="1" max="200" onchange="applyFilters()">
        <span>–</span>
        <input type="number" id="f-fot-til" placeholder="Til" min="1" max="200" onchange="applyFilters()">
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-motor">Motor</label>
      <select id="f-motor" onchange="applyFilters()">
        <option value="">Alle</option>
        <option>Innenbords</option>
        <option>Utenbords</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-drivstoff">Drivstoff</label>
      <select id="f-drivstoff" onchange="applyFilters()">
        <option value="">Alle</option>
        <option>Bensin</option>
        <option>Diesel</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Hestekrefter</label>
      <div class="range-row">
        <input type="number" id="f-hk-fra" placeholder="Fra" min="0" onchange="applyFilters()">
        <span>–</span>
        <input type="number" id="f-hk-til" placeholder="Til" min="0" onchange="applyFilters()">
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Pris (NOK)</label>
      <div class="range-row">
        <input type="number" id="f-pris-fra" placeholder="Fra" min="0" onchange="applyFilters()">
        <span>–</span>
        <input type="number" id="f-pris-til" placeholder="Til" min="0" onchange="applyFilters()">
      </div>
    </div>

    <button class="btn-reset" onclick="resetFilters()">↺ Nullstill filter</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">Treff</div>
        <div class="value" id="stat-treff">—</div>
        <div class="sub" id="stat-treff-sub"></div>
      </div>
      <div class="stat-card highlight">
        <div class="label">Snittpris</div>
        <div class="value" id="stat-snitt">—</div>
        <div class="sub" id="stat-snitt-sub"></div>
      </div>
      <div class="stat-card">
        <div class="label">Medianpris</div>
        <div class="value" id="stat-median">—</div>
        <div class="sub" id="stat-median-sub"></div>
      </div>
      <div class="stat-card">
        <div class="label">Prisintervall</div>
        <div class="value" id="stat-min" style="font-size:14px">—</div>
        <div class="sub" id="stat-max"></div>
      </div>
      <div class="stat-card">
        <div class="label">Snitt årsmodell</div>
        <div class="value" id="stat-ar">—</div>
        <div class="sub" id="stat-ar-sub"></div>
      </div>
      <div class="stat-card">
        <div class="label">Snitt HK</div>
        <div class="value" id="stat-hk">—</div>
        <div class="sub" id="stat-hk-sub"></div>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart-wrap" id="chart-wrap">
      <h4>Gjennomsnittspris per annonsert år</h4>
      <canvas id="priceChart"></canvas>
    </div>

    <!-- TABLE -->
    <div class="result-header">
      <div class="result-count">Viser <span id="rc-vis">0</span> av <span id="rc-total">0</span> annonser</div>
      <div class="sort-row">
        Sorter:
        <select id="sort-by" onchange="applySort()">
          <option value="pris-desc">Pris (høy → lav)</option>
          <option value="pris-asc">Pris (lav → høy)</option>
          <option value="ar-desc">Årsmodell (ny → gammel)</option>
          <option value="ar-asc">Årsmodell (gammel → ny)</option>
          <option value="fot-desc">Lengde (stor → liten)</option>
          <option value="fot-asc">Lengde (liten → stor)</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="toggleSort('pris')">Tittel</th>
            <th onclick="toggleSort('merke')">Merke</th>
            <th onclick="toggleSort('ar')">År <span class="sort-icon">↕</span></th>
            <th onclick="toggleSort('fot')">Fot <span class="sort-icon">↕</span></th>
            <th>Motor / HK</th>
            <th>Drivstoff</th>
            <th onclick="toggleSort('pris')" class="sorted">Pris <span class="sort-icon">↓</span></th>
            <th>Kilde</th>
          </tr>
        </thead>
        <tbody id="result-tbody"></tbody>
      </table>
      <div class="pager" id="pager">
        <span id="pager-info"></span>
        <div class="pager-btns" id="pager-btns"></div>
      </div>
    </div>

  </main>
</div>

const MERKER = [...new Set(BOAT_DATA.map(b => b.m).filter(m => m !== '-'))].sort();
const TYPER  = [...new Set(BOAT_DATA.map(b => b.ty).filter(t => t !== '-'))].sort();

let filtered = [];
let sortKey = 'pris';
let sortDir = 'desc';
let page = 1;
const PER_PAGE = 50;
let activeKilde = 'all';
let priceChart = null;

// Init dropdowns
function initFilters() {
  const ms = document.getElementById('f-merke');
  MERKER.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; ms.appendChild(o); });
  const ts = document.getElementById('f-type');
  TYPER.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; ts.appendChild(o); });
}

function setKilde(k) {
  activeKilde = k;
  ['all','ekstern','intern'].forEach(id => {
    const btn = document.getElementById('kilde-' + id);
    btn.className = 'kilde-btn' + (id === k ? ' active-' + id : '');
  });
  applyFilters();
}

function getVal(id) { return document.getElementById(id).value; }
function getNum(id) { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? null : v; }

function applyFilters() {
  const merke    = getVal('f-merke');
  const type     = getVal('f-type');
  const motor    = getVal('f-motor');
  const drivstoff= getVal('f-drivstoff');
  const arFra    = getNum('f-ar-fra');
  const arTil    = getNum('f-ar-til');
  const fotFra   = getNum('f-fot-fra');
  const fotTil   = getNum('f-fot-til');
  const hkFra    = getNum('f-hk-fra');
  const hkTil    = getNum('f-hk-til');
  const prisFra  = getNum('f-pris-fra');
  const prisTil  = getNum('f-pris-til');

  filtered = BOAT_DATA.filter(b => {
    if (activeKilde === 'ekstern' && b.ki !== 'Ekstern') return false;
    if (activeKilde === 'intern'  && b.ki !== 'Intern')  return false;
    if (merke     && b.m  !== merke)     return false;
    if (type      && b.ty !== type)      return false;
    if (motor     && b.mot !== motor)    return false;
    if (drivstoff && b.dr !== drivstoff) return false;
    if (arFra  !== null && (b.ar === 0 || b.ar < arFra))   return false;
    if (arTil  !== null && (b.ar === 0 || b.ar > arTil))   return false;
    if (fotFra !== null && (b.fo === 0 || b.fo < fotFra))  return false;
    if (fotTil !== null && (b.fo === 0 || b.fo > fotTil))  return false;
    if (hkFra  !== null && (b.hk === 0 || b.hk < hkFra))  return false;
    if (hkTil  !== null && (b.hk === 0 || b.hk > hkTil))  return false;
    if (prisFra !== null && b.p < prisFra) return false;
    if (prisTil !== null && b.p > prisTil) return false;
    return true;
  });

  page = 1;
  applySort();
  updateStats();
  updateChart();
}

function applySort() {
  const sv = document.getElementById('sort-by').value;
  const [k, d] = sv.split('-');
  sortKey = k === 'pris' ? 'p' : k === 'ar' ? 'ar' : k === 'fot' ? 'fo' : 'p';
  sortDir = d;
  filtered.sort((a, b) => {
    const av = a[sortKey] || 0, bv = b[sortKey] || 0;
    return sortDir === 'asc' ? av - bv : bv - av;
  });
  renderTable();
}

function toggleSort(key) {
  const map = { pris: 'p', ar: 'ar', fot: 'fo', merke: 'm' };
  const k = map[key];
  if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortKey = k; sortDir = 'desc'; }
  filtered.sort((a, b) => {
    const av = typeof a[sortKey] === 'string' ? a[sortKey].localeCompare(b[sortKey]) : (a[sortKey] || 0) - (b[sortKey] || 0);
    return sortDir === 'asc' ? av : -av;
  });
  renderTable();
}

function fmtPris(p) {
  if (!p) return '—';
  return new Intl.NumberFormat('no-NO', { style: 'currency', currency: 'NOK', maximumFractionDigits: 0 }).format(p);
}

function updateStats() {
  const n = filtered.length;
  const prices = filtered.map(b => b.p).filter(Boolean).sort((a,b) => a-b);
  const avg    = prices.length ? Math.round(prices.reduce((s,v) => s+v, 0) / prices.length) : 0;
  const median = prices.length ? prices[Math.floor(prices.length/2)] : 0;
  const min    = prices[0];
  const max    = prices[prices.length-1];
  const ars    = filtered.map(b => b.ar).filter(a => a > 1900);
  const avgAr  = ars.length ? Math.round(ars.reduce((s,v) => s+v, 0) / ars.length) : 0;
  const hks    = filtered.map(b => b.hk).filter(h => h > 0);
  const avgHk  = hks.length ? Math.round(hks.reduce((s,v) => s+v, 0) / hks.length) : 0;

  document.getElementById('stat-treff').textContent    = n.toLocaleString('no-NO');
  document.getElementById('stat-treff-sub').textContent = n === BOAT_DATA.length ? 'Totalt i databasen' : 'matcher filteret';
  document.getElementById('stat-snitt').textContent    = avg ? fmtPris(avg) : '—';
  document.getElementById('stat-median').textContent   = median ? fmtPris(median) : '—';
  document.getElementById('stat-min').textContent      = min ? fmtPris(min) : '—';
  document.getElementById('stat-max').textContent      = max ? 'Maks: ' + fmtPris(max) : '';
  document.getElementById('stat-ar').textContent       = avgAr || '—';
  document.getElementById('stat-hk').textContent       = avgHk ? avgHk + ' hk' : '—';
}

function updateChart() {
  const byYear = {};
  filtered.forEach(b => {
    const y = b.aay;
    if (!y || y < 2017) return;
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(b.p);
  });
  const years = Object.keys(byYear).sort();
  const avgs  = years.map(y => {
    const arr = byYear[y];
    return Math.round(arr.reduce((s,v) => s+v, 0) / arr.length);
  });
  const counts = years.map(y => byYear[y].length);

  const ctx = document.getElementById('priceChart').getContext('2d');
  if (priceChart) priceChart.destroy();
  if (years.length < 2) {
    document.getElementById('chart-wrap').style.display = 'none';
    return;
  }
  document.getElementById('chart-wrap').style.display = '';
  priceChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: years,
      datasets: [{
        label: 'Snittpris (NOK)',
        data: avgs,
        backgroundColor: 'rgba(10,33,64,0.7)',
        borderColor: '#c9a84c',
        borderWidth: 1.5,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const y = ctx.parsed.y;
              const c = counts[ctx.dataIndex];
              return [
                'Snitt: ' + new Intl.NumberFormat('no-NO').format(y) + ' kr',
                'Annonser: ' + c
              ];
            }
          }
        }
      },
      scales: {
        y: {
          ticks: {
            callback: v => new Intl.NumberFormat('no-NO', { notation: 'compact', maximumFractionDigits: 1 }).format(v) + ' kr'
          },
          grid: { color: 'rgba(0,0,0,0.05)' }
        },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderTable() {
  const tbody = document.getElementById('result-tbody');
  const total = filtered.length;
  const totalPages = Math.ceil(total / PER_PAGE);
  const start = (page - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  document.getElementById('rc-total').textContent = total.toLocaleString('no-NO');
  document.getElementById('rc-vis').textContent   = Math.min(page * PER_PAGE, total).toLocaleString('no-NO');

  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <p>Ingen båter matcher gjeldende filter.</p>
    </div></td></tr>`;
    document.getElementById('pager-info').textContent = '';
    document.getElementById('pager-btns').innerHTML = '';
    return;
  }

  tbody.innerHTML = slice.map(b => {
    const link = b.li && b.li.startsWith('http')
      ? `<a class="tittel-link" href="${b.li}" target="_blank" rel="noopener">${esc(b.t || b.m + ' ' + b.mo)}</a>`
      : `<span class="no-link">${esc(b.t || b.m + ' ' + b.mo)}</span>`;
    const kilde = b.ki === 'Intern'
      ? '<span class="badge-kilde badge-intern2">Intern</span>'
      : '<span class="badge-kilde badge-ekstern2">Ekstern</span>';
    const motorStr = [b.mot && b.mot !== '-' ? b.mot : null, b.hk ? b.hk + ' hk' : null].filter(Boolean).join(' / ') || '—';
    return `<tr>
      <td class="td-tittel">${link}</td>
      <td>${esc(b.m)}</td>
      <td class="td-center">${b.ar || '—'}</td>
      <td class="td-center">${b.fo ? b.fo + ''': '—'}</td>
      <td>${motorStr}</td>
      <td>${b.dr && b.dr !== '-' ? esc(b.dr) : '—'}</td>
      <td class="pris-cell">${fmtPris(b.p)}</td>
      <td>${kilde}</td>
    </tr>`;
  }).join('');

  // Pagination
  document.getElementById('pager-info').textContent = `Side ${page} av ${totalPages}  (${total.toLocaleString('no-NO')} treff)`;
  const btns = [];
  btns.push(`<button class="pager-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹ Forrige</button>`);
  const range = Array.from({length: Math.min(totalPages,5)}, (_,i) => {
    let p2 = Math.max(1, Math.min(page-2, totalPages-4)) + i;
    return `<button class="pager-btn ${p2===page?'active':''}" onclick="goPage(${p2})">${p2}</button>`;
  });
  btns.push(...range);
  btns.push(`<button class="pager-btn" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>Neste ›</button>`);
  document.getElementById('pager-btns').innerHTML = btns.join('');
}

function goPage(p) {
  const total = filtered.length;
  const max = Math.ceil(total / PER_PAGE);
  if (p < 1 || p > max) return;
  page = p;
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resetFilters() {
  ['f-merke','f-type','f-motor','f-drivstoff'].forEach(id => document.getElementById(id).value = '');
  ['f-ar-fra','f-ar-til','f-fot-fra','f-fot-til','f-hk-fra','f-hk-til','f-pris-fra','f-pris-til'].forEach(id => document.getElementById(id).value = '');
  setKilde('all');
}

// Boot
initFilters();
applyFilters();
</script>
</body>
</html>
