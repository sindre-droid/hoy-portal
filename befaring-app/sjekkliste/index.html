<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Salgsprosess-sjekkliste — House of Yachts</title>
  <style>
    :root{
      --navy:#0a2140;--gold:#c9a84c;
      --white:#fff;--surface:#f5f7fa;--gray:#dde3ec;--gray-dark:#6b7a8d;
      --text:#12233a;
      --green:#166534;--green-bg:#dcfce7;--green-border:#86efac;
      --blue:#1e40af;--blue-bg:#dbeafe;--blue-border:#93c5fd;
      --red:#991b1b;--red-bg:#fee2e2;--red-border:#fca5a5;
      --amber:#92400e;--amber-bg:#fef3c7;--amber-border:#fcd34d;
    }
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
         background:var(--surface);color:var(--text);margin:0;-webkit-font-smoothing:antialiased}

    /* ── Loading / Login ── */
    .loading-screen,.login-screen{min-height:100vh;display:flex;align-items:center;
      justify-content:center;background:var(--navy)}
    .loading-text{color:rgba(255,255,255,.5);font-size:15px}
    .login-box{background:white;border-radius:20px;padding:40px 36px;max-width:400px;
      width:calc(100% - 32px);text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)}
    .login-logo{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:.5px;margin-bottom:4px}
    .login-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:28px}
    .login-title{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:8px}
    .login-desc{font-size:14px;color:var(--gray-dark);margin-bottom:24px}
    .login-form{display:flex;flex-direction:column;gap:12px;text-align:left;margin-bottom:20px}
    .login-form label{font-size:13px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px}
    .login-form input{width:100%;padding:13px 15px;border:2px solid var(--gray);border-radius:10px;
      font-size:16px;font-family:inherit;background:var(--surface)}
    .login-form input:focus{outline:none;border-color:var(--navy);background:white}
    .btn-login{width:100%;padding:15px;background:var(--navy);color:white;border:none;
      border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
    .btn-login:disabled{opacity:.55;cursor:not-allowed}
    .login-error{color:#991b1b;font-size:13px;font-weight:600;margin-top:10px;display:none}

    /* ── Topbar ── */
    .topbar{background:var(--navy);color:white;padding:0 20px;height:56px;
      position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.35);
      display:flex;align-items:center;gap:14px}
    .topbar-brand{display:flex;flex-direction:column;line-height:1;flex:1}
    .brand-name{font-size:14px;font-weight:800;letter-spacing:.8px}
    .brand-sub{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-top:2px}
    .topbar-sep{color:rgba(255,255,255,.25)}
    .topbar-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.85)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .user-label{font-size:12px;color:rgba(255,255,255,.55);white-space:nowrap}
    .btn-topbar{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);
      border-radius:20px;color:rgba(255,255,255,.85);padding:6px 14px;font-size:12px;
      font-family:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
    .btn-topbar:hover{background:rgba(255,255,255,.2)}

    /* ── Layout ── */
    .layout{display:flex;height:calc(100vh - 56px);overflow:hidden}

    /* ── Sidebar ── */
    .sidebar{width:286px;min-width:240px;border-right:1px solid var(--gray);
      background:white;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
    /* ── View dropdown (replaces tab row) ── */
    .view-dropdown{position:relative;padding:10px 10px 0}
    .view-dropdown-btn{width:100%;display:flex;align-items:center;justify-content:space-between;
      padding:9px 13px;background:white;border:1.5px solid var(--gray);border-radius:9px;
      font-size:13px;font-weight:700;color:var(--navy);font-family:inherit;
      cursor:pointer;user-select:none;transition:border-color .15s,background .15s}
    .view-dropdown-btn:hover{border-color:var(--navy);background:var(--surface)}
    .view-dropdown-btn.open{border-color:var(--navy);border-bottom-left-radius:0;border-bottom-right-radius:0}
    .view-dropdown-arrow{font-size:10px;color:var(--gray-dark);transition:transform .18s;flex-shrink:0}
    .view-dropdown-btn.open .view-dropdown-arrow{transform:rotate(180deg)}
    .view-dropdown-list{position:absolute;left:10px;right:10px;top:100%;background:white;
      border:1.5px solid var(--navy);border-top:none;border-bottom-left-radius:9px;
      border-bottom-right-radius:9px;z-index:100;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.12)}
    .view-dropdown-item{display:block;width:100%;padding:10px 14px;background:none;border:none;
      font-size:13px;font-weight:600;color:var(--text);font-family:inherit;cursor:pointer;
      text-align:left;transition:background .12s}
    .view-dropdown-item:hover{background:var(--surface)}
    .view-dropdown-item.active{color:var(--navy);background:var(--blue-bg)}
    .view-dropdown-item + .view-dropdown-item{border-top:1px solid var(--gray)}
    .sidebar-search{padding:10px 10px 6px}
    .search-input{width:100%;padding:8px 12px;border:1.5px solid var(--gray);border-radius:8px;
      font-size:13px;font-family:inherit;background:var(--surface)}
    .search-input:focus{outline:none;border-color:var(--navy);background:white}
    .deal-list{flex:1;overflow-y:auto;padding:4px 6px 8px}
    .deal-item{border-radius:8px;padding:10px 11px;cursor:pointer;border:2px solid transparent;margin-bottom:3px}
    .deal-item:hover{background:var(--surface)}
    .deal-item.active{background:var(--blue-bg);border-color:var(--blue-border)}
    .deal-row1{display:flex;align-items:center;gap:7px;margin-bottom:4px}
    .warmth-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .w10{background:#ef4444}.w9{background:#f97316}.w7{background:#eab308}
    .w5{background:#84cc16}.wlo{background:#94a3b8}
    .deal-name{font-size:13px;font-weight:600;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .deal-item.active .deal-name{color:var(--blue)}
    .deal-row2{display:flex;gap:5px;flex-wrap:wrap;padding-left:16px;align-items:center}
    .stage-pill{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap}
    .stage-pill.a{background:#e0e7ff;color:#3730a3}
    .stage-pill.b{background:var(--green-bg);color:var(--green)}
    .stage-pill.closed{background:#f1f5f9;color:#64748b}
    .deal-pct{font-size:10px;color:var(--gray-dark);margin-left:auto}
    /* Red dot in deal list if critical issues */
    .crit-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0;margin-left:2px}
    .no-deals{padding:28px 14px;text-align:center;color:var(--gray-dark);font-size:13px;line-height:1.6}
    .list-spinner{display:flex;justify-content:center;padding:32px}

    /* ── Main panel ── */
    .main-panel{flex:1;overflow-y:auto;padding:24px 28px 80px;min-width:0}
    .empty-state{display:flex;flex-direction:column;align-items:center;
      justify-content:center;height:100%;text-align:center;color:var(--gray-dark)}
    .empty-icon{font-size:52px;margin-bottom:16px;opacity:.35}
    .empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
    .empty-sub{font-size:14px;line-height:1.6;max-width:300px}

    /* ── Deal header ── */
    .deal-hdr{margin-bottom:22px}
    .deal-hdr-name{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px}
    .deal-hdr-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
    /* Next step banner */
    .next-step-box{background:var(--amber-bg);border:1.5px solid var(--amber-border);border-radius:9px;
      padding:9px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
    .next-step-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
      color:var(--amber);white-space:nowrap;margin-top:2px}
    .next-step-text{font-size:13px;color:var(--text);line-height:1.5;flex:1}
    .meta-pill{font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px}
    .meta-pill.a{background:#e0e7ff;color:#3730a3}
    .meta-pill.b{background:var(--green-bg);color:var(--green)}
    .meta-pill.none{background:var(--surface);color:var(--gray-dark);border:1px solid var(--gray)}
    .save-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;margin-left:auto}
    .save-badge.saving{background:var(--amber-bg);color:var(--amber)}
    .save-badge.saved  {background:var(--green-bg);color:var(--green)}

    /* Critical counter — the leader's number */
    .crit-counter{display:flex;gap:10px;align-items:center;margin-bottom:10px;
      padding:10px 14px;border-radius:10px;background:var(--surface);border:1px solid var(--gray)}
    .crit-counter.has-issues{background:var(--red-bg);border-color:var(--red-border)}
    .crit-counter.all-ok    {background:var(--green-bg);border-color:var(--green-border)}
    .crit-main{font-size:14px;font-weight:700}
    .crit-counter.has-issues .crit-main{color:var(--red)}
    .crit-counter.all-ok     .crit-main{color:var(--green)}
    .crit-sub{font-size:12px;color:var(--gray-dark);margin-left:auto}

    .progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--gray-dark);margin-bottom:4px}
    .progress-pct{font-weight:700;color:var(--navy)}
    .prog-bar-wrap{height:4px;background:var(--gray);border-radius:2px;overflow:hidden;margin-bottom:6px}
    .prog-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
    .hs-links{display:flex;gap:12px;flex-wrap:wrap}
    .hs-link{font-size:11px;color:var(--blue);text-decoration:none;font-weight:600}
    .hs-link:hover{text-decoration:underline}

    /* ── Phase section ── */
    .phase{margin-bottom:24px}
    .phase-hdr{display:flex;justify-content:space-between;align-items:center;
      padding-bottom:7px;border-bottom:1px solid var(--gray);margin-bottom:8px}
    .phase-title{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--gray-dark)}
    .phase-count{font-size:12px;font-weight:700;color:var(--navy)}
    .phase-bar-wrap{height:3px;background:var(--gray);border-radius:2px;overflow:hidden;margin-bottom:10px}
    .phase-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
    .phase-missing{font-size:13px;color:var(--gray-dark);padding:8px 13px;font-style:italic;
      background:var(--amber-bg);border-radius:8px;margin-bottom:8px}

    /* Fold toggle */
    .fold-toggle{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;
      cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-dark);
      background:var(--surface);border:1px solid var(--gray);margin-bottom:6px;user-select:none}
    .fold-toggle:hover{background:#eef2f7}
    .fold-arrow{font-size:10px;transition:transform .2s}
    .fold-toggle.open .fold-arrow{transform:rotate(90deg)}
    .fold-content{overflow:hidden}

    /* ── Checklist items ── */
    .cl-item{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;
      border-radius:8px;margin-bottom:3px;border:1px solid transparent;transition:background .12s}
    .cl-item.manual:not(.disabled):hover{background:var(--surface)}
    .cl-item.chk-manual{background:var(--green-bg);border-color:var(--green-border)}
    .cl-item.chk-auto  {background:#f0fdf4;border-color:#bbf7d0}
    /* Only blocking-gate items get red — recommended items stay neutral */
    .cl-item.gate-warn {background:var(--red-bg);border-color:var(--red-border)}
    .cl-item.disabled  {opacity:.5}

    .cl-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;
      display:flex;align-items:center;justify-content:center;font-size:12px}
    .cl-box.a-on {background:#86efac;color:#14532d}
    .cl-box.a-off{border:2px solid var(--gray);background:var(--surface);opacity:.7}
    .cl-box.m-on {background:var(--green);color:white}
    .cl-box.m-off{border:2px dashed #94a3b8;background:white}
    .cl-item.gate-warn .cl-box.m-off{border-color:#f87171;background:#fff5f5}
    /* Hover only on the checkbox square itself */
    .cl-box[onclick]:hover.m-off{border-color:var(--navy);background:#f0f4ff}
    .cl-box[onclick]{cursor:pointer;user-select:none;transition:border-color .12s,background .12s}

    /* B7 save button */
    .b7-actions{display:flex;align-items:center;gap:10px;margin-top:6px}
    .btn-save-note{padding:6px 14px;background:var(--navy);color:white;border:none;
      border-radius:7px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
    .btn-save-note:hover{background:#1a3a5c}
    .btn-save-note:active{transform:scale(.97)}

    .cl-body{flex:1;min-width:0}
    .cl-label{font-size:14px;font-weight:600;color:var(--text);line-height:1.4}
    .cl-item.chk-manual .cl-label,
    .cl-item.chk-auto   .cl-label{color:var(--green)}
    .cl-item.gate-warn  .cl-label{color:var(--red)}
    .cl-detail{font-size:12px;color:var(--gray-dark);margin-top:2px;line-height:1.45}
    .cl-footer{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}

    /* Tags */
    .cl-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
    .cl-tag.auto    {background:#e0e7ff;color:#3730a3}
    .cl-tag.manual  {background:var(--amber-bg);color:var(--amber)}
    .cl-tag.befaring{background:#fce7f3;color:#9d174d}
    .cl-tag.gate    {background:var(--red-bg);color:var(--red)}
    .cl-tag.gate-ok {background:var(--green-bg);color:var(--green)}
    /* Recommended = soft, not red */
    .cl-tag.optional{background:#f8fafc;color:#64748b;border:1px solid var(--gray)}
    .cl-tag.pending {background:var(--amber-bg);color:var(--amber)}

    /* Shortcut button */
    .shortcut-btn{font-size:11px;font-weight:600;color:var(--blue);text-decoration:none;
      padding:2px 8px;border:1px solid var(--blue-border);border-radius:6px;background:var(--blue-bg);
      white-space:nowrap}
    .shortcut-btn:hover{background:#bfdbfe}

    /* Time warning */
    .time-warn{display:flex;align-items:center;gap:7px;margin-top:5px;padding:5px 9px;
      border-radius:6px;font-size:12px;font-weight:600;width:fit-content}
    .time-warn.red  {background:var(--red-bg);color:var(--red)}
    .time-warn.amber{background:var(--amber-bg);color:var(--amber)}

    /* B7 textarea */
    .b7-wrap{margin-top:8px}
    .b7-textarea{width:100%;padding:9px 11px;border:1.5px solid var(--gray);border-radius:8px;
      font-size:13px;font-family:inherit;color:var(--text);background:white;resize:vertical;
      min-height:72px;line-height:1.5}
    .b7-textarea:focus{outline:none;border-color:var(--navy)}
    .b7-hint{font-size:11px;color:var(--gray-dark);margin-top:4px}

    /* Spinner */
    .spinner{width:22px;height:22px;border:3px solid var(--gray);
      border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Mobile */
    @media(max-width:680px){
      .layout{flex-direction:column;height:auto;overflow:visible}
      .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--gray)}
      .deal-list{max-height:220px}
      .main-panel{padding:16px 14px 60px}
      .topbar-title,.topbar-sep,.user-label{display:none}
    }

    /* ── Toast notification ── */
    .toast{position:fixed;bottom:24px;right:24px;background:#166534;color:white;
      padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;
      box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transform:translateY(8px);
      transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;max-width:320px}
    .toast.visible{opacity:1;transform:translateY(0)}
    /* ── B6 / oppgjør warning banner ── */
    .b6-warn-banner{background:#fee2e2;border:2px solid #f87171;border-radius:10px;
      padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .b6-warn-text{font-size:13px;font-weight:700;color:#991b1b;line-height:1.4}
    .b6-warn-badge{font-size:10px;font-weight:700;background:#991b1b;color:white;
      padding:2px 7px;border-radius:6px;white-space:nowrap;margin-left:auto;flex-shrink:0}
    /* ── Team overview table ── */
    .team-table{border:1.5px solid var(--gray);border-radius:10px;overflow:hidden;background:white;margin-top:16px}
    .team-row{display:grid;grid-template-columns:1fr 80px 100px 100px 32px;
      align-items:center;padding:12px 16px;gap:12px;cursor:pointer;border-bottom:1px solid var(--gray)}
    .team-row:last-child{border-bottom:none}
    .team-row:hover:not(.team-header){background:var(--surface)}
    .team-header{background:var(--surface);font-size:10px;font-weight:700;text-transform:uppercase;
      letter-spacing:.5px;color:var(--gray-dark);cursor:default}
    .team-name{font-size:14px;font-weight:600;color:var(--text)}
    .team-cell{font-size:13px;color:var(--gray-dark);text-align:center}
    .team-completed{font-size:13px;color:var(--green);font-weight:600;text-align:center}
    .team-arrow{color:var(--gray-dark);text-align:center}
    /* ── Traffic-light badges in deal list ── */
    .traf-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;margin-left:auto}
    .traf-red   {background:var(--red-bg);color:var(--red)}
    .traf-yellow{background:var(--amber-bg);color:var(--amber)}
    .traf-green {background:var(--green-bg);color:var(--green)}

    /* ── Min dag view ── */
    .min-dag-view{max-width:680px;margin:0 auto}
    .min-dag-header{margin-bottom:14px}
    .min-dag-title{font-size:22px;font-weight:800;color:var(--navy)}
    .min-dag-sub{font-size:13px;color:var(--gray-dark);margin-top:3px}
    /* Neutral blue counter — individual items carry the urgency colour, not the header */
    .min-dag-counter{border-radius:12px;padding:11px 16px;font-size:14px;font-weight:600;margin-bottom:18px;
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--blue-bg);color:var(--blue)}
    .min-dag-counter.all-ok{background:var(--green-bg);color:var(--green)}
    .min-dag-progress{font-size:12px;color:var(--green);font-weight:600;margin-top:4px}
    .min-dag-backlog{font-size:12px;color:var(--gray-dark);margin-top:2px}
    .mdag-empty{text-align:center;padding:56px 0;font-size:16px;color:var(--gray-dark)}
    /* Deal groups */
    .mdag-group{background:white;border:1.5px solid var(--gray);border-radius:10px;
      margin-bottom:8px;overflow:hidden;transition:border-color .15s}
    .mdag-group.expanded{border-color:#93c5fd}
    .mdag-group-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
    .mdag-group-hdr:hover{background:var(--surface)}
    .mdag-group-icon{font-size:15px;flex-shrink:0}
    .mdag-group-info{flex:1;min-width:0}
    .mdag-group-name{font-size:14px;font-weight:600;color:var(--text);
      display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .mdag-group-stage{font-size:11px;color:var(--gray-dark)}
    .mdag-group-mangler{font-size:11px;color:var(--gray-dark);margin-top:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
    .mdag-group-arrow{font-size:11px;color:var(--gray-dark);flex-shrink:0;margin-left:4px}
    .mdag-group-body{border-top:1px solid var(--gray);padding:10px 12px 6px}
    .mdag-item{background:var(--surface);border-radius:8px;
      padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
    .mdag-item:last-child{margin-bottom:4px}
    .mdag-box{width:20px;height:20px;border-radius:5px;border:2px dashed #94a3b8;
      background:white;flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;
      align-items:center;justify-content:center;font-size:12px;transition:border-color .12s,background .12s}
    .mdag-box:hover{border-color:var(--navy);background:#f0f4ff}
    .mdag-box.done{background:var(--green);border:2px solid var(--green);color:white}
    .mdag-body{flex:1;min-width:0}
    .mdag-label{font-size:13px;font-weight:600;color:var(--text)}
    .mdag-detail{font-size:12px;color:var(--gray-dark);margin-top:2px;line-height:1.4}
    .mdag-open-link{font-size:12px;font-weight:600;color:var(--navy);text-decoration:none;
      display:inline-block;margin:6px 0 4px;padding:4px 10px;border:1.5px solid var(--gray);
      border-radius:7px;transition:border-color .12s,background .12s}
    .mdag-open-link:hover{border-color:var(--navy);background:var(--blue-bg)}
    .btn-load-more{display:block;width:100%;padding:11px;background:none;
      border:1.5px dashed var(--gray);border-radius:10px;color:var(--gray-dark);
      font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;text-align:center}
    .btn-load-more:hover{border-color:var(--navy);color:var(--navy);background:var(--surface)}
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-text">Laster inn…</div>
</div>

<div class="login-screen" id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="login-logo">House of Yachts</div>
    <div class="login-sub">Internportal</div>
    <div class="login-title">Logg inn</div>
    <div class="login-desc">Bruk din HoY-e-post og passord.</div>
    <div class="login-form">
      <div><label>E-post</label>
        <input type="email" id="loginEmail" autocomplete="email" placeholder="deg@h-y.no"></div>
      <div><label>Passord</label>
        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••"></div>
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Logg inn</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-name">House of Yachts</div>
      <div class="brand-sub">Internportal</div>
    </div>
    <span class="topbar-sep">|</span>
    <span class="topbar-title">Salgsprosess-sjekkliste</span>
    <div class="topbar-right">
      <span class="user-label" id="userLabel"></span>
      <a class="btn-topbar" href="/">← Portal</a>
      <button class="btn-topbar" onclick="doLogout()">Logg ut</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="view-dropdown" id="viewDropdown">
        <button class="view-dropdown-btn" id="viewDropdownBtn" onclick="toggleViewDropdown()">
          <span id="viewDropdownLabel">Min dag</span>
          <span class="view-dropdown-arrow">▾</span>
        </button>
        <div class="view-dropdown-list" id="viewDropdownList" style="display:none">
          <button class="view-dropdown-item active" data-view="min_dag"     onclick="selectViewDropdown('min_dag')">Min dag</button>
          <button class="view-dropdown-item"        data-view="mine_aktive" onclick="selectViewDropdown('mine_aktive')">Mine aktive</button>
          <button class="view-dropdown-item"        data-view="historikk"   onclick="selectViewDropdown('historikk')">Historikk</button>
        </div>
      </div>
      <div class="sidebar-search">
        <input class="search-input" id="dealSearch" type="search"
               placeholder="Søk på båtnavn…" oninput="filterDeals(this.value)">
      </div>
      <div class="deal-list" id="dealList">
        <div class="list-spinner"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="main-panel" id="mainPanel">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">☑️</div>
        <div class="empty-title">Velg et oppdrag</div>
        <div class="empty-sub">Klikk på et oppdrag i listen til venstre for å åpne salgsprosess-sjekklisten.</div>
      </div>
      <div id="checklistPanel" style="display:none"></div>
      <div id="minDagPanel" style="display:none"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const IDENTITY_URL = '/.netlify/identity';
const API          = '/.netlify/functions/sjekkliste';

// ── Checklist definition ──────────────────────────────────────────────────────
// subphase 'early'/'late' is used for Phase B folding.
// gate: triggers red warning + "required for X" badge when deal is at/past that stage
// shortcut: 'deal_b' | 'befaring' — renders a quick-link button
// hasText: true — renders a textarea for free-text note (stored in sjekkliste_status as id+'_text')
const CHECKLIST = [

  // ── Fase A: Selgeranskaffelse ─────────────────────────────────────────────
  { id:'a_lead',       phase:'a', label:'Lead i Pipeline A',
    auto:'a_exists', detail:'Deal opprettet i Pipeline A (Selgeranskaffelse).', tag:'auto' },

  { id:'a1_qualified', phase:'a', label:'A1 — Selger kvalifisert etter HoY-kriterier',
    manual:true, tag:'manual',
    detail:'Riktig segment (verdi, merke), realistisk tidslinje (< 90 dager), geografisk OK.',
    gate:'a_stage:1', gateLabel:'Kreves fra "Interessert – i dialog"',
    autoAlt:'b_exists', autoAltLabel:'Pipeline B opprettet — selger bekreftet kvalifisert' },

  { id:'a_befaring',   phase:'a', label:'Befaring gjennomført',
    auto:'a_stage:4|befaring_note', tag:'befaring',
    detail:'Deal i «Valuation Done» eller befaringsskjema registrert.' },

  { id:'a2_egenerklaring', phase:'a', label:'A2 — Egenerklæringsskjema signert (Oneflow)',
    manual:true, tag:'manual',
    detail:'Bekreftet signert via Oneflow, dokument lagret på dealen.',
    gate:'b_exists', gateLabel:'Kreves før Pipeline B opprettes',
    autoAlt:'b_exists', autoAltLabel:'Pipeline B opprettet — bekrefter signering' },

  { id:'a3_oppdragsavtale', phase:'a', label:'A3 — Oppdragsavtale signert, honorarmodell avklart',
    manual:true, tag:'manual',
    detail:'Avtale signert. Provisjonsmodell dokumentert (fullt / off-market / kjøpsoppdrag).',
    gate:'b_exists', gateLabel:'Kreves før Pipeline B opprettes',
    autoAlt:'b_exists', autoAltLabel:'Pipeline B opprettet — bekrefter signering' },

  // ── Fase B early: Listing klar & kampanje ────────────────────────────────
  { id:'b_created',   phase:'b', subphase:'early', label:'Salgsdeal opprettet i Pipeline B',
    auto:'b_exists', tag:'auto',
    detail:'Pipeline B-deal er opprettet.' },

  { id:'b0_fotograf', phase:'b', subphase:'early', label:'B0 — Fotograf booket',
    manual:true, tag:'manual',
    detail:'Fotograf er booket for gjennomgang og fotografering. Krever signert egenerklæring (A2) og oppdragsavtale (A3).',
    prereqs:['a2_egenerklaring','a3_oppdragsavtale'],
    gate:'b_stage:0', gateLabel:'Kreves for «Prep / Listing Ready»',
    autoAlt:'b_stage:1', autoAltLabel:'Listing publisert — fotograf bekreftet booket' },

  { id:'b1_hin',      phase:'b', subphase:'early', label:'B1 — HIN / registreringsdata komplett',
    manual:true, tag:'manual',
    detail:'HIN og registreringsfelter er utfylt i HubSpot på dealen.',
    gate:'b_stage:0', gateLabel:'Kreves for «Prep / Listing Ready»',
    shortcut:'deal_b',
    autoAlt:'b_stage:1', autoAltLabel:'Listing publisert — HIN-data bekreftet fullført' },

  { id:'b2_kvalitet', phase:'b', subphase:'early', label:'B2 — Båtinfo kvalitetssikret mot befaringsrapport',
    manual:true, tag:'manual',
    detail:'Avvik og merknader er dokumentert i notat («Viktige merknader») før listing.',
    gate:'b_stage:0', gateLabel:'Kreves for «Prep / Listing Ready»',
    shortcut:'befaring',
    autoAlt:'b_stage:1', autoAltLabel:'Listing publisert — kvalitetssikring bekreftet' },

  { id:'b_live',      phase:'b', subphase:'early', label:'Annonse publisert',
    auto:'b_stage:1', tag:'auto',
    detail:'Deal er i stadium «Live Listing» eller videre.' },

  { id:'b3_rapport',  phase:'b', subphase:'early', label:'B3 — Første selgerrapport sendt',
    manual:true, tag:'manual', timed:7,
    detail:'Første strukturert oppdatering sendt til selger etter at listing er live.' },

  { id:'b4_prisstrategi', phase:'b', subphase:'early', label:'B4 — Prisstrategi-gjennomgang med selger',
    manual:true, tag:'manual', conditional:30,
    detail:'Samtale om videre strategi tatt og oppsummert i notat. Relevant hvis ingen bud innen 30 dager.' },

  { id:'b_offer',     phase:'b', subphase:'early', label:'Bud mottatt og behandlet',
    auto:'b_stage:2', tag:'auto',
    detail:'Deal er i stadium «Under Offer» eller videre.' },

  // ── Fase B late: Deal & oppgjør ──────────────────────────────────────────
  { id:'b5_kontrakt', phase:'b', subphase:'late', label:'B5 — Kjøpekontrakt sendt begge parter',
    manual:true, tag:'manual',
    detail:'Kjøpekontrakt + vedlegg sendt kjøper og selger.',
    gate:'b_stage:3', gateLabel:'Kreves for «In Contract»',
    autoAlt:'b_stage:3', autoAltLabel:'In Contract — bekrefter at kontrakt er signert' },

  { id:'b_contract',  phase:'b', subphase:'late', label:'Kontrakt signert',
    auto:'b_stage:3', tag:'auto',
    detail:'Deal er i stadium «In Contract» eller videre.' },

  { id:'b6_oppgjor',  phase:'b', subphase:'late', label:'B6 — Oppgjør bekreftet på klientkonto',
    manual:true, tag:'manual', adminOnly:true,
    detail:'Betaling inne og verifisert før overlevering. Kan kun bekreftes av admin.',
    gate:'b_stage:4', gateLabel:'Kreves for «Closed / Won»' },

  { id:'b7_notat',    phase:'b', subphase:'late', label:'B7 — Kort læringsnotat logget',
    manual:true, tag:'optional', optional:true, hasText:true,
    detail:'2–3 linjer om hva som gikk bra/dårlig i dette oppdraget.' },
];

// ── State ─────────────────────────────────────────────────────────────────────
let token        = null;
let allDeals     = [];
let filteredList = [];
let stagesA = [], stagesB = [];
let isAdmin      = false;
// currentView is declared below with default 'min_dag'
// Broker ID → display name (mirrors KNOWN_OWNERS in sjekkliste.js)
// Update this map if new brokers are added.

let currentDeal  = null;
let manualState  = {};
let hasBefara    = false;
let oneflowData  = null;   // { egenerklaring, oppdragsavtale, kjøpekontrakt }
let hubId        = null;   // HubSpot portal ID for deal deep-links
let saveTimer    = null;
let saveStatus   = 'idle';
let foldState      = {};     // { phase_a: bool, phase_b_early: bool, _dealKey: str }
let minDagLimit    = 5;      // How many deal groups to show in Min dag by default
let minDagExpanded = new Set(); // Which deal group keys are expanded in Min dag
let completedToday = 0;      // Critical items checked during this session (reset on view switch)
let currentView    = 'min_dag'; // Start on Min dag
let toastTimer     = null;   // Timer handle for toast auto-dismiss

const BROKER_NAMES = {
  '633479117': 'Sindre',
  '29136352':  'Daniel',
  '77221549':  'Henrik',
};

// ── Auth ──────────────────────────────────────────────────────────────────────
function parseJWT(t) {
  try {
    let p = (t||'').split('.')[1];
    p = p.replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(atob(p + '='.repeat((4-p.length%4)%4)));
  } catch { return null; }
}
function getEmail() { return parseJWT(token)?.email || ''; }

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const btn   = document.getElementById('btnLogin');
  const err   = document.getElementById('loginError');
  btn.disabled=true; btn.textContent='Logger inn…'; err.style.display='none';
  try {
    const r = await fetch(`${IDENTITY_URL}/token`, {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:`grant_type=password&username=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`,
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error_description||'Feil brukernavn eller passord.');
    token = d.access_token; localStorage.setItem('hoy_access_token', token); showApp();
  } catch(e) {
    err.textContent=e.message; err.style.display='block';
    btn.disabled=false; btn.textContent='Logg inn';
  }
}
function doLogout() { localStorage.removeItem('hoy_access_token'); window.location.href='/'; }

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  token = localStorage.getItem('hoy_access_token');
  if (!token) {
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('loginScreen').style.display='flex';
    return;
  }
  await showApp();
});

async function showApp() {
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userLabel').textContent = getEmail();
  await loadDeals();
  if (isAdmin) addAdminTab();
  // Render the default view (Min dag) on first load
  document.getElementById('emptyState').style.display = 'none';
  renderMinDag();
}

const VIEW_LABELS = {
  min_dag:      'Min dag',
  mine_aktive:  'Mine aktive',
  historikk:    'Historikk',
  team_oversikt:'Team',
};

function addAdminTab() {
  const list = document.getElementById('viewDropdownList');
  if (list.querySelector('[data-view="team_oversikt"]')) return;
  const btn = document.createElement('button');
  btn.className='view-dropdown-item'; btn.dataset.view='team_oversikt';
  btn.textContent='Team';
  btn.onclick = () => selectViewDropdown('team_oversikt');
  list.appendChild(btn);
}

function toggleViewDropdown() {
  const list = document.getElementById('viewDropdownList');
  const trigger = document.getElementById('viewDropdownBtn');
  const isOpen = list.style.display !== 'none';
  list.style.display = isOpen ? 'none' : 'block';
  trigger.classList.toggle('open', !isOpen);
}

function selectViewDropdown(view) {
  // Close the dropdown
  document.getElementById('viewDropdownList').style.display = 'none';
  document.getElementById('viewDropdownBtn').classList.remove('open');
  switchView(view);
}

function updateDropdownLabel(view) {
  document.getElementById('viewDropdownLabel').textContent = VIEW_LABELS[view] || view;
  document.querySelectorAll('.view-dropdown-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
}

// ── View switching ────────────────────────────────────────────────────────────
async function switchView(view) {
  currentView=view; currentDeal=null; foldState={};
  if (view==='min_dag') { minDagLimit=5; minDagExpanded=new Set(); completedToday=0; }
  updateDropdownLabel(view);
  const hideList = view==='min_dag' || view==='team_oversikt';
  document.getElementById('emptyState').style.display= hideList ? 'none' : 'flex';
  document.getElementById('checklistPanel').style.display='none';
  document.getElementById('minDagPanel').style.display='none';
  await loadDeals();
  if (view==='min_dag') renderMinDag();
  else if (view==='team_oversikt') renderTeamOversikt();
}

// ── Load deals ─────────────────────────────────────────────────────────────────
async function loadDeals() {
  document.getElementById('dealList').innerHTML='<div class="list-spinner"><div class="spinner"></div></div>';
  // Min dag always uses mine_aktive data; team_oversikt fetches teamets_aktive
  const fetchView = currentView === 'min_dag' ? 'mine_aktive'
                  : currentView === 'team_oversikt' ? 'teamets_aktive'
                  : currentView;
  try {
    const r = await fetch(`${API}?view=${fetchView}`,{headers:{Authorization:`Bearer ${token}`}});
    if (r.status===401){doLogout();return;}
    const d = await r.json();
    allDeals=d.deals||[]; stagesA=d.stages_a||[]; stagesB=d.stages_b||[]; isAdmin=d.is_admin||false;
    hubId = d.hub_id || null;
    filterDeals(document.getElementById('dealSearch').value||'');
  } catch(e) {
    document.getElementById('dealList').innerHTML=`<div class="no-deals">Feil: ${escH(e.message)}</div>`;
  }
}

// ── Filter + render deal list ─────────────────────────────────────────────────
function filterDeals(q) {
  filteredList = q ? allDeals.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())) : allDeals;
  renderDealList();
}

function wDotClass(w){ return w>=10?'w10':w>=9?'w9':w>=7?'w7':w>=5?'w5':'wlo'; }

function renderDealList() {
  const el = document.getElementById('dealList');
  if (!filteredList.length) {
    el.innerHTML=`<div class="no-deals">${currentView==='historikk'?'Ingen lukkede oppdrag.':'Ingen aktive oppdrag funnet.'}</div>`;
    return;
  }
  el.innerHTML = filteredList.map((d,i) => {
    const critN = quickCritUnresolved(d);
    const trafCls = critN === 0 ? 'traf-green' : critN === 1 ? 'traf-yellow' : 'traf-red';
    const trafLbl = critN === 0 ? '0 kritiske' : `${critN} kritisk${critN===1?'':'e'}`;
    let badges='';
    if (d.pipeline_a_id&&d.stage_a_label) badges+=`<span class="stage-pill a">${escH(d.stage_a_label)}</span>`;
    if (d.pipeline_b_id&&d.stage_b_label) {
      const cls=(d.warmth<0)?'closed':'b';
      badges+=`<span class="stage-pill ${cls}">${escH(d.stage_b_label)}</span>`;
    }
    // B6 warning badge: red "B6 !" for Closed Won deals with unconfirmed oppgjør
    const b6Warn = hasCriticalOppgjorWarn(d)
      ? `<span class="traf-badge traf-red" title="Oppgjør ikke bekreftet">B6 !</span>`
      : '';
    const isAct = currentDeal&&dealKey(d)===dealKey(currentDeal);
    return `
      <div class="deal-item${isAct?' active':''}" onclick="selectDeal(${i})">
        <div class="deal-row1">
          <span class="warmth-dot ${wDotClass(d.warmth)}"></span>
          <span class="deal-name">${escH(d.name)}</span>
          ${b6Warn}
        </div>
        <div class="deal-row2">${badges}<span class="traf-badge ${trafCls}">${trafLbl}</span></div>
      </div>`;
  }).join('');
}

function quickProgress(deal) {
  let manual={};
  try{manual=deal.sjekkliste_status?JSON.parse(deal.sjekkliste_status):{};}catch{}
  let checked=0,total=0;
  for(const item of CHECKLIST){
    if(item.conditional)continue;
    total++;
    if(item.auto&&evalAuto(item.auto,deal,false))checked++;
    // Note: oneflow state not available in list view, rely on saved manualState
    if(item.manual&&manual[item.id])checked++;
  }
  return{checked,total};
}

function quickCritUnresolved(deal) {
  let manual={};
  try{manual=deal.sjekkliste_status?JSON.parse(deal.sjekkliste_status):{};}catch{}
  let n=0;
  for(const item of CHECKLIST){
    if(!item.gate)continue;
    const chk=item.auto
      ? evalAuto(item.auto,deal,false)
      : (manual[item.id]||(item.autoAlt?evalAuto(item.autoAlt,deal,false):false)||false);
    if(!chk&&evalGate(item.gate,deal))n++;
  }
  return n;
}

function dealKey(d){return d.pipeline_b_id||d.pipeline_a_id||d.name;}

// ── Select deal ───────────────────────────────────────────────────────────────
async function selectDeal(idx) {
  currentDeal = filteredList[idx];
  if (!currentDeal) return;
  try{manualState=currentDeal.sjekkliste_status?JSON.parse(currentDeal.sjekkliste_status):{};}
  catch{manualState={};}
  hasBefara=false; oneflowData=null;
  initFoldState(currentDeal);
  renderDealList();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('checklistPanel').style.display='block';
  renderChecklist();
  if (currentDeal.pipeline_a_id || currentDeal.pipeline_b_id) {
    try {
      const params = [];
      if (currentDeal.pipeline_a_id) params.push(`deal_a_id=${currentDeal.pipeline_a_id}`);
      if (currentDeal.pipeline_b_id) params.push(`deal_b_id=${currentDeal.pipeline_b_id}`);
      if (currentDeal.name)          params.push(`deal_name=${encodeURIComponent(currentDeal.name)}`);
      const r = await fetch(`${API}?${params.join('&')}`, {headers:{Authorization:`Bearer ${token}`}});
      const d = await r.json();
      hasBefara   = d.has_befaring_note || false;
      oneflowData = d.oneflow || null;
    } catch {}
    renderChecklist();
  }
}

// ── Fold state initialisation ─────────────────────────────────────────────────
function initFoldState(deal) {
  // Reset if different deal
  if (foldState._dealKey !== dealKey(deal)) {
    foldState = { _dealKey: dealKey(deal) };
    // Phase A auto-folds when listing is live (A phase is complete)
    if (deal.stage_b_idx >= 1) foldState.phase_a = true;
    // Phase B early auto-folds when deal is In Contract or later
    if (deal.stage_b_idx >= 3) foldState.phase_b_early = true;
  }
}

function toggleFold(key) { foldState[key]=!foldState[key]; renderChecklist(); }

// ── Auto-check evaluation ─────────────────────────────────────────────────────
function evalAuto(expr, deal, bef) {
  const b = (bef!==undefined?bef:hasBefara);
  return expr.split('|').some(c=>{
    if(c==='a_exists')      return !!deal.pipeline_a_id;
    if(c==='b_exists')      return !!deal.pipeline_b_id;
    if(c==='befaring_note') return b;
    if(c.startsWith('a_stage:')) return deal.stage_a_idx >= +c.split(':')[1];
    if(c.startsWith('b_stage:')) return deal.stage_b_idx >= +c.split(':')[1];
    return false;
  });
}
function evalGate(g,deal){
  if(!g)return false;
  if(g==='b_exists')return !!deal.pipeline_b_id;
  if(g.startsWith('a_stage:'))return deal.stage_a_idx>=+g.split(':')[1];
  if(g.startsWith('b_stage:'))return deal.stage_b_idx>=+g.split(':')[1];
  return false;
}
function daysSince(s){if(!s)return null;return Math.floor((Date.now()-new Date(s))/86400000);}

// Returns the Oneflow state for an item: 'signed'|'pending'|'draft'|null
function getOneflowState(itemId) {
  if (!oneflowData) return null;
  if (itemId === 'a2_egenerklaring')  return oneflowData.egenerklaring  || null;
  if (itemId === 'a3_oppdragsavtale') return oneflowData.oppdragsavtale || null;
  if (itemId === 'b5_kontrakt')       return oneflowData['kjøpekontrakt'] || null;
  return null;
}
// Returns true only if fully signed in Oneflow
function isOneflowChecked(itemId) {
  return getOneflowState(itemId) === 'signed';
}

// Check if prereqs for an item are all met
function prereqsMet(item, deal) {
  if (!item.prereqs) return true;
  return item.prereqs.every(pid => {
    const pi = CHECKLIST.find(c => c.id === pid);
    if (!pi) return false;
    return pi.auto
      ? evalAuto(pi.auto, deal)
      : (manualState[pid] || isOneflowChecked(pid) || (pi.autoAlt ? evalAuto(pi.autoAlt, deal) : false) || false);
  });
}

// ── Critical counter ──────────────────────────────────────────────────────────
function getCritStats(deal){
  let unresolved=0,total=0;
  for(const item of CHECKLIST){
    if(!item.gate)continue;
    total++;
    const chk=item.auto
      ? evalAuto(item.auto,deal)
      : (manualState[item.id]||isOneflowChecked(item.id)||(item.autoAlt?evalAuto(item.autoAlt,deal):false)||false);
    if(!chk&&evalGate(item.gate,deal))unresolved++;
  }
  return{unresolved,total};
}

// ── Render checklist ──────────────────────────────────────────────────────────
function renderChecklist() {
  if (!currentDeal) return;
  const deal = currentDeal;

  // Overall progress
  let totalChk=0, totalAll=0;
  for(const item of CHECKLIST){
    if(item.conditional)continue;
    totalAll++;
    if(item.auto&&evalAuto(item.auto,deal))totalChk++;
    if(item.manual&&manualState[item.id])totalChk++;
  }
  const pct = totalAll?Math.round(totalChk/totalAll*100):0;

  // Critical stats
  const {unresolved:critN} = getCritStats(deal);
  const critClass = critN>0?'has-issues':'all-ok';
  const critText  = critN>0
    ? `⚠️ ${critN} kritiske punkt${critN===1?'':'er'} uløst`
    : '✓ Alle kritiske punkter OK';
  const critSub = `Totalt: ${totalChk}/${totalAll} (${pct}%)`;

  let saveBadge='';
  if(saveStatus==='saving') saveBadge='<span class="save-badge saving">Lagrer…</span>';
  if(saveStatus==='saved')  saveBadge='<span class="save-badge saved">Lagret ✓</span>';

  let html = `
    <div class="deal-hdr">
      <div class="deal-hdr-name">${escH(deal.name)}</div>
      <div class="deal-hdr-pills">
        ${deal.pipeline_a_id?`<span class="meta-pill a">Pipeline A: ${escH(deal.stage_a_label||'—')}</span>`:`<span class="meta-pill none">Ingen Pipeline A</span>`}
        ${deal.pipeline_b_id?`<span class="meta-pill b">Pipeline B: ${escH(deal.stage_b_label||'—')}</span>`:`<span class="meta-pill none">Ingen Pipeline B</span>`}
        ${saveBadge}
      </div>
      <div class="crit-counter ${critClass}">
        <span class="crit-main">${critText}</span>
        <span class="crit-sub">${critSub}</span>
      </div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div class="hs-links">
        ${deal.pipeline_a_id?`<a class="hs-link" href="https://app.hubspot.com/contacts/${hubId||'me'}/deal/${deal.pipeline_a_id}" target="_blank">🔗 Pipeline A i HubSpot</a>`:''}
        ${deal.pipeline_b_id?`<a class="hs-link" href="https://app.hubspot.com/contacts/${hubId||'me'}/deal/${deal.pipeline_b_id}" target="_blank">🔗 Pipeline B i HubSpot</a>`:''}
        ${deal.pipeline_b_id&&deal.stage_b_idx>=2?`<a class="hs-link" href="/budgivning/?deal=${deal.pipeline_b_id}">📋 Åpne budgivning →</a>`:''}
      </div>
    </div>
    ${deal.next_step ? `
      <div class="next-step-box">
        <span class="next-step-label">Next step</span>
        <span class="next-step-text">${escH(deal.next_step)}</span>
      </div>` : ''}
    `;

  // ── B6 / Oppgjør warning banner ───────────────────────────────────────────
  if (isClosedWon(deal) && !manualState['b6_oppgjor']) {
    html += `
      <div class="b6-warn-banner">
        <span style="font-size:22px">⚠️</span>
        <div class="b6-warn-text">
          Dealen er markert Closed Won, men oppgjør er ikke bekreftet på klientkonto.<br>
          <span style="font-weight:500">Bekreft B6 nedenfor så snart betaling er inne.</span>
        </div>
        <span class="b6-warn-badge">B6 mangler</span>
      </div>`;
  }

  // ── Fase A ────────────────────────────────────────────────────────────────
  html += renderPhaseSection({
    title:    'Fase A — Seller Acquisition',
    items:    CHECKLIST.filter(i=>i.phase==='a'),
    foldKey:  'phase_a',
    deal,
    disabled: false,
    autoFoldHint: deal.stage_b_idx>=1 ? 'Listing er aktiv — fase A fullført' : null,
  });

  // ── Fase B early ──────────────────────────────────────────────────────────
  const bDisabled = !deal.pipeline_b_id;
  html += renderPhaseSection({
    title:   'Listing / Sale',
    items:   CHECKLIST.filter(i=>i.phase==='b'&&i.subphase==='early'),
    foldKey: 'phase_b_early',
    deal,
    disabled: bDisabled,
    autoFoldHint: deal.stage_b_idx>=3 ? 'Deal er i kontrakt — denne fasen er passert' : null,
    missingMsg: bDisabled ? '⚠️ Ingen Pipeline B-deal. Opprett salgsdeal i HubSpot (A2 + A3 kreves).' : null,
  });

  // ── Fase B late ───────────────────────────────────────────────────────────
  html += renderPhaseSection({
    title:   'Kontrakt og Oppgjør',
    items:   CHECKLIST.filter(i=>i.phase==='b'&&i.subphase==='late'),
    foldKey: null,  // never auto-fold late items
    deal,
    disabled: bDisabled,
    missingMsg: null,
  });

  document.getElementById('checklistPanel').innerHTML = html;
}

// ── Render a phase section ────────────────────────────────────────────────────
function renderPhaseSection({title, items, foldKey, deal, disabled, autoFoldHint, missingMsg}) {
  const isFolded = foldKey ? (foldState[foldKey]||false) : false;

  // Compute phase progress (for fold summary)
  let phChk=0, phTot=0;
  for(const item of items){
    if(item.conditional)continue;
    phTot++;
    if(item.auto&&evalAuto(item.auto,deal))phChk++;
    if(item.manual&&manualState[item.id])phChk++;
  }
  const phPct = phTot?Math.round(phChk/phTot*100):0;

  let html = `<div class="phase">
    <div class="phase-hdr">
      <span class="phase-title">${title}</span>
      <span class="phase-count">${phChk}/${phTot}</span>
    </div>
    <div class="phase-bar-wrap"><div class="phase-bar-fill" style="width:${phPct}%"></div></div>`;

  if (missingMsg) {
    html += `<div class="phase-missing">${missingMsg}</div>`;
  }

  if (foldKey) {
    const hint = autoFoldHint ? ` — ${autoFoldHint}` : '';
    html += `
      <div class="fold-toggle ${isFolded?'':'open'}" onclick="toggleFold('${foldKey}')">
        <span class="fold-arrow">▶</span>
        <span>${isFolded ? `Vis fase (${phChk}/${phTot} fullført${hint})` : `Skjul fase`}</span>
      </div>`;
    if (isFolded) { html += '</div>'; return html; }
  }

  // Render items
  for(const item of items){
    // Conditional B4
    if(item.conditional){
      const days=daysSince(deal.live_listing_date);
      if(!(deal.stage_b_idx>=1&&deal.stage_b_idx<2&&days!==null&&days>=item.conditional)) continue;
    }

    // autoAlt for Oneflow items (a2/a3/b5) is only a fallback when Oneflow API
    // is unavailable. If we have live Oneflow data, trust it — don't override.
    const isOneflowItem = ['a2_egenerklaring','a3_oppdragsavtale','b5_kontrakt'].includes(item.id);
    const oneflowApiLive = oneflowData?.source === 'oneflow_api';
    const isAutoAlt = !!(item.autoAlt && evalAuto(item.autoAlt, deal) && !(isOneflowItem && oneflowApiLive));
    const isChk = item.auto
      ? evalAuto(item.auto, deal)
      : (manualState[item.id] || isOneflowChecked(item.id) || isAutoAlt || false);
    const prereqLocked = !prereqsMet(item, deal);
    const isDisabled = (disabled && item.id !== 'b_created') || prereqLocked;
    // Gate only warns if not checked AND not auto-alt resolved AND not prereq-locked
    const gateOn = !isChk && item.gate && evalGate(item.gate, deal) && !prereqLocked;

    let itemCls='';
    if(isChk && item.auto)                    itemCls='chk-auto';
    if(isChk && item.manual && !isAutoAlt)    itemCls='chk-manual';
    if(isChk && isAutoAlt)                    itemCls='chk-auto';  // stage-inferred looks like auto
    if(!isChk && gateOn)                      itemCls='gate-warn';

    const boxCls = (item.auto||isAutoAlt) ? (isChk?'a-on':'a-off') : (isChk?'m-on':'m-off');
    // Oneflow-checked or stage-inferred items are not user-togglable
    const isOneflow = isOneflowChecked(item.id);
    // Oneflow items (a2/a3/b5) are not manually clickable when Oneflow API is live —
    // Oneflow is the source of truth. Admins can still override manually.
    const isOneflowLocked = isOneflowItem && oneflowApiLive && !isAdmin;
    const isClickable = item.manual && !isDisabled && !isOneflow && !isAutoAlt && !isOneflowLocked;
    // onclick goes on cl-box only (not the whole row)
    const boxOnClick = isClickable
      ? `onclick="toggleItem('${item.id}')" role="checkbox" aria-checked="${isChk}"` : '';

    // Tag
    let tagHtml='';
    if(item.tag==='auto')     tagHtml='<span class="cl-tag auto">Auto</span>';
    if(item.tag==='befaring') tagHtml='<span class="cl-tag befaring">Befaringsskjema</span>';
    if(item.tag==='optional') tagHtml='<span class="cl-tag optional">Anbefalt</span>';
    if(item.tag==='manual') {
      const ofState = getOneflowState(item.id);
      if (ofState === 'signed')       tagHtml=`<span class="cl-tag auto">✍ Signert via Oneflow</span>`;
      else if (ofState === 'pending') tagHtml=`<span class="cl-tag pending">📤 Sendt — venter på signering</span>`;
      else if (ofState === 'draft')   tagHtml=`<span class="cl-tag optional">📝 Opprettet, ikke sendt</span>`;
      else if (isOneflowItem && oneflowApiLive) tagHtml=`<span class="cl-tag optional">📋 Oneflow</span>`;
      else if (isAutoAlt)             tagHtml=`<span class="cl-tag auto">✓ ${escH(item.autoAltLabel||'Auto-bekreftet')}</span>`;
      else                            tagHtml='<span class="cl-tag manual">Manuell</span>';
    }
    // Prereq-locked
    if(prereqLocked) tagHtml+='<span class="cl-tag optional">🔒 Venter på A2+A3</span>';
    // Admin-only badge
    if(item.adminOnly && !isAdmin) tagHtml+='<span class="cl-tag optional">🔐 Kun admin</span>';

    // Gate badge (only for items WITH gate — critical ones)
    let gateBadge='';
    if(item.gate){
      if(gateOn)       gateBadge=`<span class="cl-tag gate">⚠️ ${escH(item.gateLabel)}</span>`;
      else if(evalGate(item.gate,deal)&&isChk) gateBadge=`<span class="cl-tag gate-ok">✓ ${escH(item.gateLabel)}</span>`;
    }

    // Shortcut
    let shortcutHtml='';
    if(item.shortcut==='deal_b'&&deal.pipeline_b_id)
      shortcutHtml=`<a class="shortcut-btn" href="https://app.hubspot.com/contacts/${hubId||'me'}/deal/${deal.pipeline_b_id}" target="_blank">Åpne deal ↗</a>`;
    if(item.shortcut==='befaring'&&deal.pipeline_a_id)
      shortcutHtml=`<a class="shortcut-btn" href="https://app.hubspot.com/contacts/${hubId||'me'}/deal/${deal.pipeline_a_id}#activity" target="_blank">Se befaringsrapport ↗</a>`;

    // Time warning (B3)
    let timeWarnHtml='';
    if(item.timed&&!isChk&&deal.live_listing_date&&deal.stage_b_idx>=1){
      const days=daysSince(deal.live_listing_date);
      if(days!==null&&days>=item.timed)
        timeWarnHtml=`<div class="time-warn red">⏰ ${days} dager siden publisering — selgerrapport ikke sendt!</div>`;
      else if(days!==null&&days>=item.timed-2)
        timeWarnHtml=`<div class="time-warn amber">⏰ ${days} dager siden publisering — send selgerrapport snart.</div>`;
    }

    // B7 textarea
    let b7Html='';
    if(item.hasText&&isChk){
      b7Html=`<div class="b7-wrap">
        <textarea class="b7-textarea" placeholder="Skriv 2–3 linjer om hva som gikk bra/dårlig…"
          onclick="event.stopPropagation()"
          oninput="updateNoteText('${item.id}',this.value)"
        >${escH(manualState[item.id+'_text']||'')}</textarea>
        <div class="b7-actions">
          <button class="btn-save-note" onclick="saveNoteNow(event)">Lagre notat →</button>
          <span class="b7-hint">Lagres til HubSpot når du klikker «Lagre».</span>
        </div>
      </div>`;
    }

    const footer = [tagHtml, gateBadge, shortcutHtml].filter(Boolean).join('');

    html+=`
      <div class="cl-item ${itemCls} ${item.manual?'manual':''} ${isDisabled?'disabled':''}">
        <div class="cl-box ${boxCls}" ${boxOnClick}>${isChk?'✓':''}</div>
        <div class="cl-body">
          <div class="cl-label">${escH(item.label)}</div>
          <div class="cl-detail">${escH(item.detail)}</div>
          ${footer?`<div class="cl-footer">${footer}</div>`:''}
          ${timeWarnHtml}${b7Html}
        </div>
      </div>`;
  }

  html += '</div>';
  return html;
}

// ── Toggle manual item ────────────────────────────────────────────────────────
function toggleItem(id) {
  if (!currentDeal) return;
  const item = CHECKLIST.find(i=>i.id===id);
  if (item?.phase==='b'&&!currentDeal.pipeline_b_id) {
    alert('Manuelle punkter i fase B krever en Pipeline B-deal. Opprett salgsdeal i HubSpot.');
    return;
  }
  // B6 is admin-only
  if (id === 'b6_oppgjor' && !isAdmin) {
    alert('Kun admin kan bekrefte oppgjør på klientkonto.');
    return;
  }
  // Block if prereqs not met
  if (item?.prereqs && !prereqsMet(item, currentDeal)) {
    alert('Krav ikke oppfylt: A2 (egenerklæring) og A3 (oppdragsavtale) må være signert først.');
    return;
  }
  // Ignore if auto-checked via Oneflow
  if (isOneflowChecked(id)) return;
  manualState[id] = !manualState[id];
  // Store timestamp when checking; remove when unchecking (used for "7-day completed" tracking)
  if (manualState[id]) {
    manualState[id + '_ts'] = Date.now();
  } else {
    delete manualState[id + '_ts'];
  }
  // If unchecking an item with text, keep the text but the checkbox is off
  saveStatus='saving';
  renderChecklist();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveState,800);
}

// ── Update free-text note (B7) — updates local state only; use save button to persist ──
function updateNoteText(itemId, val) {
  manualState[itemId+'_text'] = val;
  // No autosave — user must press «Lagre notat»
}

// ── Explicit save triggered by note save button ───────────────────────────────
function saveNoteNow(e) {
  if (e) e.stopPropagation();
  if (!currentDeal?.pipeline_b_id) return;
  clearTimeout(saveTimer);
  saveStatus = 'saving';
  renderChecklist();
  saveState();
}

function triggerSave() {
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveState,300);
}

// ── Save to HubSpot ───────────────────────────────────────────────────────────
async function saveState() {
  if (!currentDeal?.pipeline_b_id) { saveStatus='idle'; renderChecklist(); return; }
  try {
    const r = await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body:JSON.stringify({deal_b_id:currentDeal.pipeline_b_id,sjekkliste_status:manualState}),
    });
    const d=await r.json();
    saveStatus=d.ok?'saved':'idle';
    if(d.ok){
      currentDeal.sjekkliste_status=JSON.stringify(manualState);
      const idx=allDeals.findIndex(x=>dealKey(x)===dealKey(currentDeal));
      if(idx>=0) allDeals[idx].sjekkliste_status=currentDeal.sjekkliste_status;
    }
  } catch { saveStatus='idle'; }
  renderChecklist();
  setTimeout(()=>{saveStatus='idle';renderChecklist();},3000);
}

// ── Min dag ───────────────────────────────────────────────────────────────────

// Short user-friendly labels for each checklist item (used in "Mangler: ..." row)
const SHORT_LABELS = {
  a1_qualified:      'Kvalifisert',
  a2_egenerklaring:  'Egenerklæring',
  a3_oppdragsavtale: 'Oppdragsavtale',
  b0_fotograf:       'Fotograf',
  b1_hin:            'HIN-data',
  b2_kvalitet:       'Befaringsnotat',
  b3_rapport:        '1. selgerrapport',
  b4_prisstrategi:   'Prisstrategi',
  b5_kontrakt:       'Kjøpekontrakt',
  b6_oppgjor:        'Oppgjør bekreftet',
  b7_notat:          'Læringsnotat',
};

// Build a flat list of all pending manual items across the user's active deals.
// autoAlt items (including stage-inferred ones added to a1/b0/b1/b2) are
// treated as done and excluded — this eliminates "fake debt" for old deals.
function buildMinDagItems() {
  const result = [];
  for (const deal of allDeals) {
    // Skip closed deals (warmth < 0 = historikk) — they shouldn't appear in Min dag
    if (deal.warmth < 0) continue;

    let manual = {};
    try { manual = deal.sjekkliste_status ? JSON.parse(deal.sjekkliste_status) : {}; } catch {}

    const ea = expr => expr.split('|').some(c => {
      if (c==='a_exists')           return !!deal.pipeline_a_id;
      if (c==='b_exists')           return !!deal.pipeline_b_id;
      if (c==='befaring_note')      return false;
      if (c.startsWith('a_stage:')) return deal.stage_a_idx >= +c.split(':')[1];
      if (c.startsWith('b_stage:')) return deal.stage_b_idx >= +c.split(':')[1];
      return false;
    });
    const eg = g => {
      if (!g) return false;
      if (g==='b_exists')           return !!deal.pipeline_b_id;
      if (g.startsWith('a_stage:')) return deal.stage_a_idx >= +g.split(':')[1];
      if (g.startsWith('b_stage:')) return deal.stage_b_idx >= +g.split(':')[1];
      return false;
    };

    for (const item of CHECKLIST) {
      if (!item.manual) continue;
      if (item.adminOnly && !isAdmin) continue;

      const gateActive    = !!(item.gate && eg(item.gate));
      const isTimedItem   = !!(item.timed && deal.stage_b_idx >= 1 && deal.live_listing_date);
      const isConditional = !!(item.conditional && deal.stage_b_idx >= 1 && deal.stage_b_idx < 2 && deal.live_listing_date);

      if (!gateActive && !isTimedItem && !isConditional) continue;

      // Done if: manually checked OR autoAlt satisfied (stage-inferred auto-complete)
      const isAutoAlt = !!(item.autoAlt && ea(item.autoAlt));
      if (manual[item.id] || isAutoAlt) continue;

      // Timed/conditional items only appear after their threshold
      if (isTimedItem && !gateActive) {
        const days = daysSince(deal.live_listing_date);
        if (days === null || days < item.timed) continue;
      }
      if (isConditional && !gateActive) {
        const days = daysSince(deal.live_listing_date);
        if (days === null || days < item.conditional) continue;
      }

      let urgency = 'open';
      if (isTimedItem) {
        const days = daysSince(deal.live_listing_date);
        if (days !== null && days >= item.timed) urgency = 'overdue';
      }
      if (isConditional) {
        const days = daysSince(deal.live_listing_date);
        if (days !== null && days >= item.conditional) urgency = 'overdue';
      }

      const isCritical = !!item.gate;
      // sortKey: 0 = overdue+critical, 1 = critical on hot stage, 2 = critical cold, 3 = recommended
      const hotStage = deal.warmth >= 7; // Live Listing, Under Offer, In Contract
      const sortKey  = urgency==='overdue' && isCritical ? 0
                     : isCritical && hotStage             ? 1
                     : isCritical                         ? 2
                     :                                      3;

      result.push({ deal, item, isCritical, urgency, sortKey });
    }
  }
  result.sort((a, b) => a.sortKey - b.sortKey || b.deal.warmth - a.deal.warmth || a.deal.name.localeCompare(b.deal.name));
  return result;
}

// Group flat items by deal, sorted by worst-item urgency then deal warmth
function buildMinDagGroups() {
  const flatItems = buildMinDagItems();
  const groupMap  = new Map();
  for (const entry of flatItems) {
    const k = dealKey(entry.deal);
    if (!groupMap.has(k)) groupMap.set(k, { deal: entry.deal, items: [] });
    groupMap.get(k).items.push(entry);
  }
  const groups = [...groupMap.values()];
  groups.sort((a, b) => {
    const aMin = Math.min(...a.items.map(i => i.sortKey));
    const bMin = Math.min(...b.items.map(i => i.sortKey));
    return aMin !== bMin ? aMin - bMin : b.deal.warmth - a.deal.warmth;
  });
  return groups;
}

function renderMinDag() {
  const panel = document.getElementById('minDagPanel');
  panel.style.display = 'block';

  const groups         = buildMinDagGroups();
  const totalCrit      = groups.reduce((n, g) => n + g.items.filter(i => i.isCritical).length, 0);
  const dealsWithCrit  = groups.filter(g => g.items.some(i => i.isCritical)).length;
  const visGroups      = groups.slice(0, minDagLimit);
  const hiddenGrp      = groups.slice(minDagLimit);
  const hiddenCrit     = hiddenGrp.reduce((n, g) => n + g.items.filter(i => i.isCritical).length, 0);

  // ── Header ──────────────────────────────────────────────────────────────────
  // Focus-oriented, not shame-focused. Neutral blue always; no red header.
  const progressLine = completedToday > 0
    ? `<div class="min-dag-progress">Du har fullført ${completedToday} kritiske punkt${completedToday===1?'':'er'} i dag ✓</div>`
    : '';
  const backlogLine = totalCrit > 0
    ? `<div class="min-dag-backlog">Totalt ${totalCrit} kritiske gjenstår på ${groups.length} oppdrag</div>`
    : '';

  let html = `<div class="min-dag-view">
    <div class="min-dag-header">
      <div class="min-dag-title">Min dag</div>
      <div class="min-dag-counter${totalCrit===0?' all-ok':''}">
        ${totalCrit === 0
          ? '<span>Dagens fokus: alle båtene er trygge 🌊</span>'
          : `<span>Dagens fokus: <strong>${dealsWithCrit}</strong> båt${dealsWithCrit===1?'':'er'} med åpne kritiske punkter</span>`
        }
      </div>
      ${progressLine}${backlogLine}
    </div>`;

  // ── Empty state ──────────────────────────────────────────────────────────────
  if (totalCrit === 0) {
    html += `
      <div style="text-align:center;padding:52px 20px">
        <div style="font-size:48px;margin-bottom:16px">🌊</div>
        <div style="font-size:20px;font-weight:800;color:var(--navy);margin-bottom:8px">Alle båtene dine er trygge</div>
        <div style="font-size:14px;color:var(--gray-dark);margin-bottom:28px">Bruk resten av blokken på å fylle på pipeline.</div>
        <a href="/fsbo" style="display:inline-block;padding:12px 24px;background:var(--navy);color:white;
          border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;margin-right:10px">
          Åpne FSBO-verktøy →
        </a>
      </div>`;
  } else {
    // ── Deal groups ────────────────────────────────────────────────────────────
    for (let gi = 0; gi < visGroups.length; gi++) {
      const grp  = visGroups[gi];
      // Use pipeline ID as key (always numeric, safe in onclick)
      const gk   = grp.deal.pipeline_b_id || grp.deal.pipeline_a_id || String(gi);
      const isExp    = minDagExpanded.has(gk);
      const critN    = grp.items.filter(i => i.isCritical).length;
      const overdueN = grp.items.filter(i => i.urgency === 'overdue').length;
      const trafCls  = critN === 0 ? 'traf-green' : overdueN > 0 ? 'traf-red' : critN === 1 ? 'traf-yellow' : 'traf-red';
      const icon     = overdueN > 0 ? '⚠️' : critN > 1 ? '🔴' : critN === 1 ? '🟡' : '🟢';
      const stageLbl = grp.deal.stage_b_label || grp.deal.stage_a_label || '—';

      // "Mangler: HIN-data • 1. selgerrapport +1"
      const critItems = grp.items.filter(i => i.isCritical);
      const MAX_SHOWN = 3;
      const shownLabels = critItems.slice(0, MAX_SHOWN).map(e => SHORT_LABELS[e.item.id] || e.item.label);
      const extraN = critItems.length - shownLabels.length;
      const manglerTxt = shownLabels.join(' • ') + (extraN > 0 ? ` +${extraN}` : '');

      html += `
        <div class="mdag-group${isExp?' expanded':''}">
          <div class="mdag-group-hdr" onclick="toggleMinDagGroup('${gk}')">
            <span class="mdag-group-icon">${icon}</span>
            <div class="mdag-group-info">
              <span class="mdag-group-name">${escH(grp.deal.name)}</span>
              <span class="mdag-group-stage">${escH(stageLbl)}</span>
              ${critN > 0 ? `<span class="mdag-group-mangler">Mangler: ${escH(manglerTxt)}</span>` : ''}
            </div>
            <span class="traf-badge ${trafCls}">${critN} kritisk${critN===1?'':'e'}</span>
            <span class="mdag-group-arrow">${isExp?'▼':'▶'}</span>
          </div>`;

      if (isExp) {
        const dealIdx = allDeals.indexOf(grp.deal);
        html += `<div class="mdag-group-body">`;
        for (const entry of grp.items) {
          const urgBadge = entry.urgency === 'overdue'
            ? `<span class="cl-tag gate">⏰ Forfalt</span>`
            : entry.isCritical
            ? `<span class="cl-tag gate">Kritisk</span>`
            : `<span class="cl-tag optional">Anbefalt</span>`;
          html += `
            <div class="mdag-item">
              <div class="mdag-box" onclick="toggleMinDagItem(${dealIdx},'${entry.item.id}')" role="checkbox"></div>
              <div class="mdag-body">
                <div class="mdag-label">${escH(entry.item.label)}</div>
                <div class="mdag-detail">${escH(entry.item.detail)}</div>
                <div class="cl-footer" style="margin-top:4px">${urgBadge}</div>
              </div>
            </div>`;
        }
        if (grp.deal.next_step) {
          html += `<div style="font-size:12px;color:var(--amber);font-weight:600;margin:4px 0 8px;padding:6px 10px;background:var(--amber-bg);border-radius:7px">
            <span style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;opacity:.75">Next step: </span>${escH(grp.deal.next_step)}
          </div>`;
        }
        html += `<a class="mdag-open-link" href="#" onclick="openDealFromMinDag(${dealIdx});return false;">Åpne full sjekkliste →</a>`;
        html += `</div>`;
      }

      html += `</div>`;
    }

    if (hiddenGrp.length > 0) {
      html += `<button class="btn-load-more" onclick="loadMoreMinDag()">
        Last inn ${hiddenGrp.length} oppdrag til${hiddenCrit > 0 ? ` (${hiddenCrit} kritiske)` : ''} →
      </button>`;
    }
  }

  html += '</div>';
  panel.innerHTML = html;
}

function toggleMinDagGroup(key) {
  if (minDagExpanded.has(key)) minDagExpanded.delete(key);
  else minDagExpanded.add(key);
  renderMinDag();
}

function loadMoreMinDag() {
  minDagLimit += 5;
  renderMinDag();
}

async function toggleMinDagItem(dealIdx, itemId) {
  const deal = allDeals[dealIdx];
  if (!deal) return;
  if (!deal.pipeline_b_id) {
    alert('Manuelle punkter i fase B krever en Pipeline B-deal.');
    return;
  }
  let manual = {};
  try { manual = deal.sjekkliste_status ? JSON.parse(deal.sjekkliste_status) : {}; } catch {}
  const wasChecked = !!manual[itemId];
  manual[itemId] = !wasChecked;
  // Store / clear timestamp for "7-day completed" tracking
  if (manual[itemId]) {
    manual[itemId + '_ts'] = Date.now();
  } else {
    delete manual[itemId + '_ts'];
  }
  // Track session completions (only for critical items checked this session)
  const itemDef = CHECKLIST.find(c => c.id === itemId);
  if (itemDef?.gate) {
    if (manual[itemId]) completedToday++;
    else completedToday = Math.max(0, completedToday - 1);
  }
  deal.sjekkliste_status = JSON.stringify(manual);

  // Save to HubSpot
  try {
    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ deal_b_id: deal.pipeline_b_id, sjekkliste_status: manual }),
    });
  } catch {}

  // Keep in sync if this deal is currently open in checklist view
  if (currentDeal && dealKey(currentDeal) === dealKey(deal)) {
    manualState = manual;
  }

  // Toast: if we just checked a critical item and this deal now has 0 open critical items
  if (manual[itemId] && itemDef?.gate) {
    const remaining = buildMinDagItems().filter(e => dealKey(e.deal) === dealKey(deal) && e.isCritical);
    if (remaining.length === 0) {
      showToast(`${deal.name} er ryddet opp! 🎉`);
    }
  }

  renderMinDag();
  renderDealList();
}

function openDealFromMinDag(dealIdx) {
  // Switch to Mine aktive and open that deal's full checklist
  currentView = 'mine_aktive';
  updateDropdownLabel('mine_aktive');
  document.getElementById('minDagPanel').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
  const deal = allDeals[dealIdx];
  const fIdx = filteredList.indexOf(deal);
  selectDeal(fIdx >= 0 ? fIdx : dealIdx);
}

// ── Team oversikt ─────────────────────────────────────────────────────────────
function renderTeamOversikt() {
  const panel = document.getElementById('minDagPanel');
  panel.style.display = 'block';

  const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
  const since = Date.now() - SEVEN_DAYS;

  // Group deals by owner_id
  const brokerMap = new Map();
  // Pre-seed with known brokers so they always appear (even with 0 deals)
  for (const [ownerId, name] of Object.entries(BROKER_NAMES)) {
    brokerMap.set(ownerId, { name, ownerId, deals: [], openCrit: 0, completed7d: 0 });
  }

  for (const deal of allDeals) {
    const ownerId = String(deal.owner_id || '');
    if (!brokerMap.has(ownerId)) {
      brokerMap.set(ownerId, { name: ownerId || 'Ukjent', ownerId, deals: [], openCrit: 0, completed7d: 0 });
    }
    const broker = brokerMap.get(ownerId);
    broker.deals.push(deal);
    broker.openCrit    += quickCritUnresolved(deal);
    broker.completed7d += countCompletedSince(deal, since);
  }

  // Filter to brokers with at least 1 deal, sort by open critical desc
  const rows = [...brokerMap.values()].filter(b => b.deals.length > 0);
  rows.sort((a, b) => b.openCrit - a.openCrit || a.name.localeCompare(b.name));

  let html = `<div class="min-dag-view">
    <div class="min-dag-header">
      <div class="min-dag-title">Team-oversikt</div>
      <div class="min-dag-sub" style="font-size:13px;color:var(--gray-dark);margin-top:3px">
        Klikk på en megler for å se deres aktive oppdrag
      </div>
    </div>
    <div class="team-table">
      <div class="team-row team-header">
        <div class="team-name">Megler</div>
        <div class="team-cell">Aktive</div>
        <div class="team-cell">Åpne kritiske</div>
        <div class="team-completed">Fullført 7d</div>
        <div class="team-arrow"></div>
      </div>`;

  for (const broker of rows) {
    const critStyle = broker.openCrit > 3
      ? 'color:var(--red);font-weight:700'
      : broker.openCrit > 0
      ? 'color:var(--amber);font-weight:600'
      : 'color:var(--green);font-weight:600';
    html += `
      <div class="team-row" onclick="filterToBroker('${escH(broker.ownerId)}')">
        <div class="team-name">${escH(broker.name)}</div>
        <div class="team-cell">${broker.deals.length}</div>
        <div class="team-cell" style="${critStyle}">${broker.openCrit}</div>
        <div class="team-completed">${broker.completed7d > 0 ? '+' + broker.completed7d : '—'}</div>
        <div class="team-arrow" style="font-size:16px;color:var(--gray-dark)">›</div>
      </div>`;
  }

  html += `</div></div>`;
  panel.innerHTML = html;
}

// Filter the deal list to a single broker and switch to their deals
function filterToBroker(ownerId) {
  currentView = 'teamets_aktive';
  updateDropdownLabel('teamets_aktive');
  document.getElementById('minDagPanel').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('checklistPanel').style.display = 'none';
  filteredList = allDeals.filter(d => String(d.owner_id || '') === String(ownerId));
  renderDealList();
}

// ── Helper: B6 / Closed Won warning ──────────────────────────────────────────
// Returns true when a Pipeline B deal has reached stage 4+ (Closed Won / oppgjør)
function isClosedWon(deal) {
  return !!(deal.pipeline_b_id && deal.stage_b_idx >= 4);
}

// Returns true when deal is Closed Won AND b6_oppgjor is still unchecked
function hasCriticalOppgjorWarn(deal) {
  if (!isClosedWon(deal)) return false;
  let manual = {};
  try { manual = deal.sjekkliste_status ? JSON.parse(deal.sjekkliste_status) : {}; } catch {}
  return !manual['b6_oppgjor'];
}

// ── Helper: Toast notification ────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('visible'), 3500);
}

// ── Helper: Count items completed in last N ms (for "7 days" team scoreboard) ──
function countCompletedSince(deal, sinceMs) {
  let manual = {};
  try { manual = deal.sjekkliste_status ? JSON.parse(deal.sjekkliste_status) : {}; } catch {}
  let count = 0;
  for (const item of CHECKLIST) {
    if (!item.gate) continue;
    const ts = manual[item.id + '_ts'];
    if (ts && ts >= sinceMs) count++;
  }
  return count;
}

// ── Utility ───────────────────────────────────────────────────────────────────
function escH(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none') doLogin();
});
// Close the view dropdown when clicking outside it
document.addEventListener('click', e => {
  const dd = document.getElementById('viewDropdown');
  if (dd && !dd.contains(e.target)) {
    document.getElementById('viewDropdownList').style.display = 'none';
    document.getElementById('viewDropdownBtn')?.classList.remove('open');
  }
});
</script>
