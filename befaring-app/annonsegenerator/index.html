<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annonsegenerator — House of Yachts</title>
  <style>
    :root {
      --navy:#0a2140; --gold:#c9a84c;
      --text:#1a1a2e; --text-light:#6b7280;
      --bg:#f9fafb; --white:#ffffff;
      --border:#e5e7eb; --border-light:#f3f4f6;
      --user-bubble:#0a2140; --ai-bubble:#ffffff;
      --topbar-h:52px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{-webkit-font-smoothing:antialiased}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

    /* ── Auth screens ─────────────────────────────────────────────────────── */
    .screen{display:none;position:fixed;inset:0;background:var(--navy);align-items:center;justify-content:center;z-index:9000}
    .screen.active{display:flex}
    .login-box{background:#fff;border-radius:16px;padding:36px;width:min(380px,calc(100vw - 32px));box-shadow:0 20px 60px rgba(0,0,0,0.35)}
    .login-logo{font-size:20px;font-weight:800;color:var(--navy)}
    .login-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:28px;margin-top:2px}
    .login-h{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:6px}
    .login-p{font-size:13px;color:var(--text-light);margin-bottom:22px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:5px}
    .field input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:var(--bg)}
    .field input:focus{outline:none;border-color:var(--navy)}
    .btn-login{width:100%;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
    .btn-login:disabled{opacity:0.5}
    .login-err{color:#dc2626;font-size:12px;font-weight:600;margin-top:8px;display:none}
    .loading-text{color:rgba(255,255,255,0.5);font-size:14px}

    /* ── App shell ────────────────────────────────────────────────────────── */
    .app{display:none;flex-direction:column;height:100vh}
    .app.show{display:flex}

    /* ── Topbar ───────────────────────────────────────────────────────────── */
    .topbar{height:var(--topbar-h);background:var(--navy);
      display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
    .topbar-back{display:flex;align-items:center;gap:5px;font-size:13px;color:rgba(255,255,255,0.6);
      text-decoration:none;padding:6px 10px;border-radius:6px;transition:background 0.15s;white-space:nowrap}
    .topbar-back:hover{background:rgba(255,255,255,0.1);color:#fff}
    .topbar-sep{color:rgba(255,255,255,0.25);font-size:18px;font-weight:200}
    .topbar-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
    .topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
    .user-name{font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap}
    .btn-new{font-size:12px;padding:7px 14px;border:1.5px solid var(--gold);border-radius:6px;
      background:none;color:var(--gold);font-family:inherit;cursor:pointer;font-weight:600;transition:background 0.15s,color 0.15s}
    .btn-new:hover{background:var(--gold);color:#fff}
    .btn-logout{font-size:12px;padding:6px 12px;border:1.5px solid rgba(255,255,255,0.2);
      border-radius:6px;background:none;color:rgba(255,255,255,0.5);font-family:inherit;cursor:pointer}
    .btn-logout:hover{border-color:rgba(255,255,255,0.5);color:#fff}

    /* ── Chat area ────────────────────────────────────────────────────────── */
    .chat-wrap{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;gap:0}

    /* ── Empty / starter state ────────────────────────────────────────────── */
    .starter-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;gap:28px;padding:24px}
    .starter-logo{font-size:22px;font-weight:800;color:var(--navy)}
    .starter-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:-20px}
    .starter-desc{font-size:14px;color:var(--text-light);text-align:center;max-width:420px;line-height:1.6}
    .starters-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:520px}
    .starter-btn{padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;
      background:var(--white);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;
      text-align:left;line-height:1.4;transition:border-color 0.15s,background 0.15s}
    .starter-btn:hover{border-color:var(--navy);background:#f0f4ff}
    .starter-btn strong{display:block;font-size:12px;color:var(--gold);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}

    /* ── Messages ─────────────────────────────────────────────────────────── */
    .messages{display:flex;flex-direction:column;gap:16px;width:100%;max-width:760px;margin:0 auto}
    .msg{display:flex;gap:10px;align-items:flex-start}
    .msg.user{flex-direction:row-reverse}
    .msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
    .msg.user .msg-avatar{background:var(--navy);color:#fff}
    .msg.assistant .msg-avatar{background:var(--gold);color:#fff}
    .msg-bubble{max-width:calc(100% - 48px);padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.65}
    .msg.user .msg-bubble{background:var(--user-bubble);color:#fff;border-radius:14px 2px 14px 14px}
    .msg.assistant .msg-bubble{background:var(--ai-bubble);color:var(--text);border:1.5px solid var(--border);border-radius:2px 14px 14px 14px}

    /* Markdown-style rendering in AI bubbles */
    .msg.assistant .msg-bubble h1,.msg.assistant .msg-bubble h2,.msg.assistant .msg-bubble h3{
      font-weight:700;margin:12px 0 6px;color:var(--navy)}
    .msg.assistant .msg-bubble h1{font-size:16px}
    .msg.assistant .msg-bubble h2{font-size:15px}
    .msg.assistant .msg-bubble h3{font-size:14px}
    .msg.assistant .msg-bubble p{margin-bottom:10px}
    .msg.assistant .msg-bubble p:last-child{margin-bottom:0}
    .msg.assistant .msg-bubble ul,.msg.assistant .msg-bubble ol{padding-left:18px;margin-bottom:10px}
    .msg.assistant .msg-bubble li{margin-bottom:3px}
    .msg.assistant .msg-bubble strong{font-weight:700;color:var(--navy)}
    .msg.assistant .msg-bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}
    .msg.assistant .msg-bubble pre{background:#f3f4f6;padding:10px 12px;border-radius:8px;font-size:12px;overflow-x:auto;margin-bottom:10px}
    .msg.assistant .msg-bubble code{background:#f3f4f6;padding:2px 5px;border-radius:4px;font-size:12px}

    /* ── Typing indicator ─────────────────────────────────────────────────── */
    .typing-indicator{display:flex;gap:4px;align-items:center;padding:14px 16px}
    .typing-indicator span{width:7px;height:7px;background:var(--text-light);border-radius:50%;animation:bounce 1.2s infinite}
    .typing-indicator span:nth-child(2){animation-delay:0.2s}
    .typing-indicator span:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* Copy button on AI messages */
    .msg-actions{display:flex;gap:6px;margin-top:6px;justify-content:flex-end}
    .btn-copy{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:5px;
      background:none;color:var(--text-light);font-family:inherit;cursor:pointer;transition:background 0.1s}
    .btn-copy:hover{background:var(--border-light);color:var(--text)}

    /* ── Input area ───────────────────────────────────────────────────────── */
    .input-area{background:var(--white);border-top:1px solid var(--border);padding:14px 16px;flex-shrink:0}
    .input-inner{display:flex;gap:10px;align-items:flex-end;max-width:760px;margin:0 auto}
    .input-box{flex:1;position:relative}
    textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
      font-size:14px;font-family:inherit;resize:none;min-height:44px;max-height:160px;
      line-height:1.5;background:var(--bg);overflow-y:auto}
    textarea:focus{outline:none;border-color:var(--navy);background:var(--white)}
    textarea::placeholder{color:var(--text-light)}
    .btn-send{width:44px;height:44px;border-radius:10px;border:none;background:var(--navy);
      color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:background 0.15s}
    .btn-send:hover{background:#1a3a5c}
    .btn-send:disabled{background:var(--border);cursor:not-allowed}
    .btn-send svg{pointer-events:none}
    .input-hint{font-size:11px;color:var(--text-light);text-align:center;margin-top:6px;max-width:760px;margin-left:auto;margin-right:auto}

    @media(max-width:600px){
      .starters-grid{grid-template-columns:1fr}
      .topbar-title{font-size:13px}
    }
  </style>
</head>
<body>

<!-- ── Auth screens ──────────────────────────────────────────────────────── -->
<div class="screen active" id="loadScreen">
  <p class="loading-text">Laster…</p>
</div>

<div class="screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">House of Yachts</div>
    <div class="login-sub">Internportal</div>
    <div class="login-h">Logg inn</div>
    <div class="login-p">Annonsegenerator — kun for HoY-meglere</div>
    <div class="field">
      <label>E-post</label>
      <input type="email" id="lEmail" placeholder="din@h-y.no" autocomplete="email">
    </div>
    <div class="field">
      <label>Passord</label>
      <input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" id="lBtn" onclick="login()">Logg inn</button>
    <div class="login-err" id="lErr"></div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────────────────── -->
<div class="app" id="app">

  <div class="topbar">
    <a href="/" class="topbar-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Portal
    </a>
    <span class="topbar-sep">|</span>
    <span class="topbar-title">Annonsegenerator</span>
    <div class="topbar-right">
      <span class="user-name" id="userName"></span>
      <button class="btn-new" onclick="newConversation()">+ Ny annonse</button>
      <button class="btn-logout" onclick="logout()">Logg ut</button>
    </div>
  </div>

  <div class="chat-wrap" id="chatWrap">
    <!-- starter state shown until first message -->
    <div class="starter-state" id="starterState">
      <div>
        <div class="starter-logo">House of Yachts</div>
        <div class="starter-sub">Annonsegenerator</div>
      </div>
      <p class="starter-desc">Skriv inn båtdata eller velg en snarvei nedenfor for å komme i gang.</p>
      <div class="starters-grid">
        <button class="starter-btn" onclick="useStarter('Start ny båtannonse')">
          <strong>Ny annonse</strong>
          Start en ny båtannonse fra bunnen av
        </button>
        <button class="starter-btn" onclick="useStarter('Forbedre eksisterende annonsetekst')">
          <strong>Forbedre tekst</strong>
          Bearbeid og løft en eksisterende annonse
        </button>
        <button class="starter-btn" onclick="useStarter('Språkvask uten å endre fakta')">
          <strong>Språkvask</strong>
          Rett språk og flyt uten å endre fakta
        </button>
        <button class="starter-btn" onclick="useStarter('Lag annonse fra befaringsrapport')">
          <strong>Fra befaringsrapport</strong>
          Lim inn rapport og generer annonse
        </button>
      </div>
    </div>
    <div class="messages" id="messages" style="display:none"></div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <div class="input-box">
        <textarea id="msgInput" placeholder="Skriv melding eller lim inn båtdata…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Husk: Lim inn all relevant informasjon om båten. Modellen spør hvis noe mangler.</p>
  </div>

</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const IDENTITY = '/.netlify/identity';
const API      = '/.netlify/functions/annonsegenerator';

// ── State ───────────────────────────────────────────────────────────────────
let token = null;
let conversationHistory = []; // [{role, content}]
let isLoading = false;

// ── Auth ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function screen(name) {
  ['loadScreen','loginScreen'].forEach(id => {
    $(id).className = 'screen' + (id === name ? ' active' : '');
  });
  if (name === 'app') { $('app').className = 'app show'; }
  else { $('app').className = 'app'; }
}

addEventListener('DOMContentLoaded', async () => {
  screen('loadScreen');
  const saved = localStorage.getItem('hoy_access_token');
  if (saved) {
    try {
      const r = await fetch(`${IDENTITY}/user`, { headers: { Authorization: `Bearer ${saved}` } });
      if (!r.ok) throw new Error();
      token = saved;
      onLogin(await r.json());
      return;
    } catch { localStorage.removeItem('hoy_access_token'); }
  }
  screen('loginScreen');
});

async function login() {
  const email = $('lEmail').value.trim(), pass = $('lPass').value;
  $('lErr').style.display = 'none';
  if (!email || !pass) { showErr('Fyll inn e-post og passord'); return; }
  $('lBtn').disabled = true; $('lBtn').textContent = 'Laster…';
  try {
    const r = await fetch(`${IDENTITY}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=password&username=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error_description || 'Feil e-post eller passord'); }
    const d = await r.json();
    token = d.access_token;
    localStorage.setItem('hoy_access_token', token);
    const u = await fetch(`${IDENTITY}/user`, { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json());
    onLogin(u);
  } catch (e) {
    showErr(e.message);
    $('lBtn').disabled = false; $('lBtn').textContent = 'Logg inn';
  }
}

function showErr(msg) { $('lErr').textContent = msg; $('lErr').style.display = 'block'; }

function logout() {
  if (!confirm('Logg ut?')) return;
  localStorage.removeItem('hoy_access_token');
  location.href = '/';
}

function onLogin(user) {
  const name = user.user_metadata?.full_name || user.email || '';
  $('userName').textContent = name;
  screen('app');
  $('msgInput').focus();
}

// ── Chat logic ────────────────────────────────────────────────────────────────
function useStarter(text) {
  $('msgInput').value = text;
  autoResize($('msgInput'));
  sendMessage();
}

function newConversation() {
  conversationHistory = [];
  $('messages').innerHTML = '';
  $('messages').style.display = 'none';
  $('starterState').style.display = '';
  $('msgInput').value = '';
  $('msgInput').focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  if (isLoading) return;
  const text = $('msgInput').value.trim();
  if (!text) return;

  // Hide starter, show messages
  $('starterState').style.display = 'none';
  $('messages').style.display = '';

  // Add user message to history and UI
  conversationHistory.push({ role: 'user', content: text });
  appendMessage('user', text);
  $('msgInput').value = '';
  autoResize($('msgInput'));

  // Show typing indicator
  isLoading = true;
  $('sendBtn').disabled = true;
  const typingEl = appendTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ messages: conversationHistory })
    });

    typingEl.remove();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      appendMessage('assistant', `⚠️ Feil: ${err.error || res.status}`);
      isLoading = false;
      $('sendBtn').disabled = false;
      return;
    }

    const data = await res.json();
    const reply = data.content || '';
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('assistant', reply, true);

  } catch (err) {
    typingEl.remove();
    appendMessage('assistant', `⚠️ Tilkoblingsfeil: ${err.message}`);
  }

  isLoading = false;
  $('sendBtn').disabled = false;
  $('msgInput').focus();
}

function appendMessage(role, text, withCopy = false) {
  const wrap = $('messages');
  const el = document.createElement('div');
  el.className = `msg ${role}`;

  const initial = role === 'user' ? '👤' : '⚓';
  el.innerHTML = `
    <div class="msg-avatar">${initial}</div>
    <div>
      <div class="msg-bubble">${role === 'assistant' ? renderMarkdown(text) : escH(text)}</div>
      ${withCopy ? `<div class="msg-actions"><button class="btn-copy" onclick="copyMsg(this)" data-text="${escAttr(text)}">Kopier tekst</button></div>` : ''}
    </div>`;

  wrap.appendChild(el);
  scrollBottom();
  return el;
}

function appendTyping() {
  const wrap = $('messages');
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = `
    <div class="msg-avatar">⚓</div>
    <div class="msg-bubble">
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>`;
  wrap.appendChild(el);
  scrollBottom();
  return el;
}

function scrollBottom() {
  const cw = $('chatWrap');
  cw.scrollTop = cw.scrollHeight;
}

function copyMsg(btn) {
  const text = btn.dataset.text;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Kopiert ✓';
    setTimeout(() => btn.textContent = 'Kopier tekst', 2000);
  });
}

// ── Simple markdown renderer ──────────────────────────────────────────────────
function renderMarkdown(text) {
  return text
    // Escape HTML first
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Headers
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Horizontal rule
    .replace(/^---+$/gm, '<hr>')
    // Bullet lists
    .replace(/^\* (.+)$/gm, '<li>$1</li>')
    .replace(/^• (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // Numbered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Wrap consecutive <li> in <ul>
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    // Paragraphs (double newline)
    .replace(/\n\n/g, '</p><p>')
    // Single newlines
    .replace(/\n/g, '<br>')
    // Wrap in paragraph
    .replace(/^(.+)/, '<p>$1</p>');
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
